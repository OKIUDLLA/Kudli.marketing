*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F5F3EE;--card:#FFFFFF;--accent:#1A1A1A;--accent-light:#333;--green:#2ecc71;--orange:#f39c12;--red:#e74c3c;--blue:#3498db;--text:#1A1A1A;--muted:#888}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.top-bar{display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem;border-bottom:1px solid rgba(0,0,0,0.06);flex-wrap:wrap;gap:1rem}
.top-bar .logo{font-weight:800;font-size:1.2rem;text-decoration:none;color:var(--text)}
.top-bar .logo span{color:var(--accent)}
.top-bar .badge{background:rgba(26,26,26,0.08);color:var(--accent);padding:0.25rem 0.75rem;border-radius:15px;font-size:0.75rem;font-weight:600}

.container{max-width:900px;margin:0 auto;padding:2rem 1.5rem}

/* Score ring */
.score-hero{text-align:center;margin-bottom:3rem}
.score-ring{position:relative;width:220px;height:220px;margin:0 auto 1.5rem}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .bg{stroke:rgba(0,0,0,0.06);fill:none;stroke-width:12}
.score-ring .fg{fill:none;stroke-width:12;stroke-linecap:round;transition:stroke-dashoffset 2s cubic-bezier(0.22,1,0.36,1)}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-num{font-size:3.5rem;font-weight:900;line-height:1}
.score-label{font-size:0.9rem;color:var(--muted)}
.score-verdict{font-size:1.3rem;font-weight:700;margin-bottom:0.5rem}
.score-desc{color:var(--muted);font-size:0.95rem;max-width:500px;margin:0 auto}

/* History badge */
.score-history{display:flex;align-items:center;justify-content:center;gap:1rem;margin-top:1rem;font-size:0.85rem;color:var(--muted)}
.score-history .prev{font-weight:700;color:var(--orange)}
.score-history .arrow{font-size:1.2rem;color:var(--green)}
.score-history .curr{font-weight:700;color:var(--green)}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;margin-bottom:2rem}
.stat{background:var(--card);border-radius:12px;padding:1rem;text-align:center;border:1px solid rgba(0,0,0,0.06)}
.stat .val{font-size:1.5rem;font-weight:800}
.stat .label{font-size:0.75rem;color:var(--muted);margin-top:0.2rem}

/* Categories */
.categories{display:flex;flex-direction:column;gap:1.25rem;margin-bottom:2.5rem}
.cat-card{background:var(--card);border-radius:16px;padding:1.25rem;border:1px solid rgba(0,0,0,0.06);cursor:pointer;transition:all 0.3s}
.cat-card:hover{border-color:rgba(233,69,96,0.2);transform:translateY(-2px)}
.cat-header{display:flex;align-items:center;gap:1rem}
.cat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.cat-info{flex:1}
.cat-info h3{font-size:0.95rem;font-weight:700}
.cat-info .sub{font-size:0.8rem;color:var(--muted)}
.cat-score{text-align:right}
.cat-score .pct{font-size:1.5rem;font-weight:800}
.cat-bar{height:6px;background:rgba(0,0,0,0.06);border-radius:3px;margin-top:0.75rem;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:3px;transition:width 1.5s cubic-bezier(0.22,1,0.36,1)}
.cat-details{display:none;margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(0,0,0,0.06)}
.cat-card.open .cat-details{display:block}
.check-item{display:flex;align-items:flex-start;gap:0.6rem;padding:0.4rem 0;font-size:0.85rem}
.check-icon{font-size:0.9rem;margin-top:1px;flex-shrink:0}
.check-text{flex:1;line-height:1.5}
.check-text.done{color:rgba(255,255,255,0.5)}
.check-text .note{display:block;font-size:0.75rem;color:var(--muted);font-style:italic}

/* Section headers */
.section-hdr{font-size:1.1rem;font-weight:700;margin:2rem 0 1rem;display:flex;align-items:center;gap:0.5rem}
.section-hdr::after{content:'';flex:1;height:1px;background:rgba(0,0,0,0.06)}

/* Next steps */
.next-section{background:var(--card);border-radius:16px;padding:1.5rem;border:1px solid rgba(0,0,0,0.06);margin-bottom:2rem}
.next-section h2{font-size:1.1rem;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem}
.next-item{display:flex;align-items:flex-start;gap:0.75rem;padding:0.6rem 0;border-bottom:1px solid rgba(0,0,0,0.04)}
.next-item:last-child{border:none}
.next-priority{padding:0.15rem 0.5rem;border-radius:6px;font-size:0.65rem;font-weight:700;white-space:nowrap;margin-top:2px}
.priority-high{background:rgba(26,26,26,0.08);color:var(--accent)}
.priority-mid{background:rgba(243,156,18,0.15);color:var(--orange)}
.priority-low{background:rgba(46,204,113,0.15);color:var(--green)}
.next-text{font-size:0.9rem;line-height:1.5}

/* Roadmap / Timeline */
.roadmap{margin-bottom:2rem}
.roadmap-phase{background:var(--card);border-radius:16px;padding:1.5rem;border:1px solid rgba(0,0,0,0.06);margin-bottom:1rem;position:relative;overflow:hidden}
.roadmap-phase::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:4px 0 0 4px}
.phase-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.phase-title{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:0.5rem}
.phase-period{font-size:0.8rem;color:var(--muted);background:rgba(0,0,0,0.06);padding:0.25rem 0.75rem;border-radius:8px}
.phase-status{font-size:0.7rem;font-weight:700;padding:0.2rem 0.6rem;border-radius:6px}
.phase-items{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:0.5rem}
.phase-item{display:flex;align-items:flex-start;gap:0.4rem;font-size:0.83rem;padding:0.3rem 0;color:rgba(255,255,255,0.7)}
.phase-item .pi-icon{font-size:0.85rem;margin-top:1px}
.phase-goal{margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid rgba(0,0,0,0.06);font-size:0.82rem;color:var(--muted);display:flex;align-items:center;gap:0.5rem}
.phase-goal strong{color:var(--accent-light)}

/* Changelog */
.changelog{margin-bottom:2rem}
.cl-entry{display:flex;gap:1rem;padding:0.75rem 0;border-bottom:1px solid rgba(0,0,0,0.04)}
.cl-entry:last-child{border:none}
.cl-date{min-width:80px;font-size:0.78rem;color:var(--muted);font-weight:600;padding-top:2px}
.cl-content{flex:1}
.cl-tag{display:inline-block;font-size:0.65rem;font-weight:700;padding:0.1rem 0.4rem;border-radius:4px;margin-right:0.4rem;margin-bottom:0.25rem}
.cl-tag.new{background:rgba(46,204,113,0.15);color:var(--green)}
.cl-tag.fix{background:rgba(26,26,26,0.08);color:var(--accent)}
.cl-tag.update{background:rgba(52,152,219,0.15);color:var(--blue)}
.cl-desc{font-size:0.85rem;line-height:1.5}

@media(max-width:600px){
 .score-ring{width:180px;height:180px}
 .score-num{font-size:2.5rem}
 .stats-row{grid-template-columns:1fr 1fr}
 .phase-items{grid-template-columns:1fr}
}
</style>

function init() {
 let totalDone = 0, totalAll = 0;
 const container = document.getElementById('categories');

 AUDIT.categories.forEach((cat, ci) => {
   const done = cat.items.filter(i => i.done).length;
   const all = cat.items.length;
   totalDone += done;
   totalAll += all;
   const pct = Math.round((done / all) * 100);
   const color = pct === 100 ? 'var(--green)' : pct >= 70 ? 'var(--orange)' : 'var(--red)';

   const div = document.createElement('div');
   div.className = 'cat-card';
   div.onclick = function() { this.classList.toggle('open'); };
   div.innerHTML = `
     <div class="cat-header">
       <div class="cat-icon" style="background:${cat.color}22;color:${cat.color}">${cat.icon}</div>
       <div class="cat-info">
         <h3>${cat.name}</h3>
         <div class="sub">${done}/${all} splněno</div>
       </div>
       <div class="cat-score">
         <div class="pct" style="color:${color}">${pct}%</div>
       </div>
     </div>
     <div class="cat-bar"><div class="cat-bar-fill" style="width:0%;background:${cat.color}"></div></div>
     <div class="cat-details">
       ${cat.items.map(item => `
         <div class="check-item">
           <span class="check-icon">${item.done ? '✅' : '⬜'}</span>
           <span class="check-text ${item.done ? 'done' : ''}">${item.text}${item.note ? `<span class="note">${item.note}</span>` : ''}</span>
         </div>
       `).join('')}
     </div>
   `;
   container.appendChild(div);
   setTimeout(() => {
     div.querySelector('.cat-bar-fill').style.width = pct + '%';
   }, 200 + ci * 100);
 });

 // Score
 const overallPct = Math.round((totalDone / totalAll) * 100);
 animateScore(overallPct);
 document.getElementById('scoreHistCurr').textContent = overallPct + '%';

 const circumference = 2 * Math.PI * 96;
 document.getElementById('scoreRing').style.strokeDasharray = circumference;
 setTimeout(() => {
   const offset = circumference * (1 - overallPct / 100);
   const ring = document.getElementById('scoreRing');
   ring.style.strokeDashoffset = offset;
   ring.style.stroke = overallPct >= 90 ? 'var(--green)' : overallPct >= 70 ? 'var(--orange)' : 'var(--red)';
 }, 300);

 let verdict, desc;
 if (overallPct >= 95) { verdict = '🏆 Dokonalý! Projekt je kompletní'; desc = 'Vše je připraveno. Gratulace!'; }
 else if (overallPct >= 90) { verdict = '🏆 Výborný! Téměř dokonalý'; desc = 'Zbývá pár drobností pro absolutní dokonalost.'; }
 else if (overallPct >= 85) { verdict = '💪 Velmi silný základ!'; desc = 'Projekt je připravený na klienty. Zbylé položky závisí na externích faktorech (IČO, doména, klienti).'; }
 else if (overallPct >= 75) { verdict = '📈 Solidní pokrok!'; desc = 'Většina je hotová. Zaměř se na kritické chybějící prvky.'; }
 else if (overallPct >= 60) { verdict = '🔧 Dobrý start'; desc = 'Základy stojí, ale zbývá hodně práce.'; }
 else { verdict = '🚧 Ve výstavbě'; desc = 'Projekt potřebuje ještě značné úsilí.'; }
 document.getElementById('scoreVerdict').textContent = verdict;
 document.getElementById('scoreDesc').textContent = desc;

 // Next steps
 const nextContainer = document.getElementById('nextSteps');
 AUDIT.nextSteps.forEach(step => {
   const cls = step.priority === 'high' ? 'priority-high' : step.priority === 'mid' ? 'priority-mid' : 'priority-low';
   const label = step.priority === 'high' ? 'VYSOKÁ' : step.priority === 'mid' ? 'STŘEDNÍ' : 'NÍZKÁ';
   nextContainer.innerHTML += `
     <div class="next-item">
       <span class="next-priority ${cls}">${label}</span>
       <span class="next-text">${step.text}</span>
     </div>
   `;
 });

 // Roadmap
 const roadmapContainer = document.getElementById('roadmap');
 AUDIT.roadmap.forEach(phase => {
   roadmapContainer.innerHTML += `
     <div class="roadmap-phase" style="border-left:none">
       <div style="position:absolute;top:0;left:0;width:4px;height:100%;background:${phase.color};border-radius:4px 0 0 4px"></div>
       <div class="phase-header">
         <div>
           <div class="phase-title">${phase.phase}</div>
           <div class="phase-period">${phase.period}</div>
         </div>
         <span class="phase-status" style="background:${phase.statusColor};color:${phase.statusText}">${phase.status}</span>
       </div>
       <div class="phase-items">
         ${phase.items.map(item => `
           <div class="phase-item">
             <span class="pi-icon">${item.startsWith('✅') ? '' : ''}</span>
             <span>${item}</span>
           </div>
         `).join('')}
       </div>
       <div class="phase-goal">🎯 <strong>Cíl:</strong> ${phase.goal}</div>
     </div>
   `;
 });

 // Changelog
 const clContainer = document.getElementById('changelog');
 AUDIT.changelog.forEach(entry => {
   const tags = entry.tags.map(t => `<span class="cl-tag ${t.cls}">${t.t}</span>`).join('');
   clContainer.innerHTML += `
     <div class="cl-entry">
       <div class="cl-date">${entry.date}</div>
       <div class="cl-content">${tags}<span class="cl-desc">${entry.desc}</span></div>
     </div>
   `;
 });
}

function animateScore(target) {
 let current = 0;
 const el = document.getElementById('scoreNum');
 const step = () => {
   current += Math.ceil((target - current) / 15);
   if (current >= target) { el.textContent = target; return; }
   el.textContent = current;
   requestAnimationFrame(step);
 };
 setTimeout(step, 500);
}

init();
