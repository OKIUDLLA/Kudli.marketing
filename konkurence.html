<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analýza konkurence — Kudli. marketing</title>
<meta name="description" content="Sledování a porovnávání konkurentů klientů — web, sociální sítě, SEO, cenová strategie.">
<meta property="og:title" content="Analýza konkurence — Kudli. marketing">
<meta property="og:description" content="Sledování a porovnávání konkurentů klientů — web, sociální sítě, SEO, cenová strategie.">
<meta property="og:image" content="https://kudlimarketing.cz/og-image.png">
<meta property="og:type" content="website">
<meta property="og:url" content="https://kudlimarketing.cz/konkurence.html">
    <link rel="canonical" href="https://www.kudlimarketing.cz/konkurence.html">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F5F3EE;--card:#FFFFFF;--accent:#1A1A1A;--accent-light:#333;--text:#1A1A1A;--muted:#888};--green:#2ecc71;--orange:#f39c12;--red:#e74c3c;--blue:#3498db;--purple:#9b59b6}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent-light);text-decoration:none}

.header{background:var(--card);border-bottom:1px solid rgba(0,0,0,0.06);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.header-left{display:flex;align-items:center;gap:1rem}
.header h1{font-size:1.3rem;font-weight:700}
.header h1 span{color:var(--accent)}
.back-link{color:var(--muted);font-size:0.85rem}

.btn{padding:0.55rem 1rem;border:none;border-radius:10px;font-size:0.82rem;cursor:pointer;font-weight:600;transition:all 0.3s;display:inline-flex;align-items:center;gap:0.4rem}
.btn-primary{background:var(--accent);color:#F5F3EE}
.btn-primary:hover{background:var(--accent-light)}
.btn-secondary{background:rgba(0,0,0,0.04);color:var(--text);border:1px solid rgba(0,0,0,0.06)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:0.35rem 0.7rem;font-size:0.78rem}
.btn-danger{background:rgba(231,76,60,0.15);color:var(--red);border:1px solid rgba(231,76,60,0.2)}

.main{max-width:1200px;margin:0 auto;padding:1.5rem 2rem}

/* Project selector */
.project-bar{display:flex;gap:0.75rem;margin-bottom:1.5rem;align-items:center;flex-wrap:wrap}
.project-bar select{padding:0.55rem 1rem;background:var(--card);border:1px solid rgba(0,0,0,0.06);border-radius:10px;color:#fff;font-size:0.9rem;font-weight:600;min-width:200px}
.project-bar select:focus{outline:none;border-color:var(--accent)}

/* Competitor grid */
.comp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:1rem;margin-bottom:2rem}
.comp-card{background:var(--card);border-radius:14px;padding:1.25rem;border:1px solid rgba(0,0,0,0.06);transition:all 0.3s;position:relative}
.comp-card:hover{border-color:rgba(255,255,255,0.15)}
.comp-card.our{border-color:var(--accent);border-width:2px}
.comp-card.our::after{content:'NÁŠ KLIENT';position:absolute;top:0.75rem;right:0.75rem;background:var(--accent);color:#fff;font-size:0.6rem;padding:0.15rem 0.5rem;border-radius:6px;font-weight:700}

.comp-header{display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem}
.comp-avatar{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:800;color:#fff}
.comp-name{font-weight:700;font-size:1rem}
.comp-url{font-size:0.75rem;color:var(--muted)}
.comp-actions{position:absolute;top:1rem;right:1rem;display:flex;gap:0.3rem}
.comp-action{width:28px;height:28px;border:none;border-radius:6px;background:rgba(0,0,0,0.06);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.8rem;transition:all 0.3s}
.comp-action:hover{background:rgba(233,69,96,0.15);color:var(--accent)}

/* Score bars */
.score-section{margin-bottom:0.75rem}
.score-row{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.4rem}
.score-label{font-size:0.75rem;color:var(--muted);min-width:90px}
.score-bar{flex:1;height:8px;background:rgba(0,0,0,0.06);border-radius:4px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:4px;transition:width 0.8s}
.score-val{font-size:0.75rem;font-weight:700;min-width:30px;text-align:right}

/* Tags */
.comp-tags{display:flex;gap:0.3rem;flex-wrap:wrap;margin-top:0.5rem}
.ctag{font-size:0.65rem;padding:0.15rem 0.45rem;border-radius:4px;font-weight:600}

/* Radar chart (CSS) */
.comparison-section{margin-bottom:2rem}
.comparison-section h2{font-size:1.1rem;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem}
.comparison-table{width:100%;border-collapse:collapse;font-size:0.85rem}
.comparison-table th{text-align:left;padding:0.6rem 0.75rem;background:var(--card);border-bottom:1px solid rgba(0,0,0,0.06);font-weight:700;color:var(--muted);font-size:0.75rem;text-transform:uppercase;letter-spacing:0.5px;position:sticky;top:0}
.comparison-table td{padding:0.55rem 0.75rem;border-bottom:1px solid rgba(255,255,255,0.03)}
.comparison-table tr:hover td{background:rgba(0,0,0,0.02)}
.comparison-table .cat-label{font-weight:600;color:var(--text)}
.comparison-table .best{color:var(--green);font-weight:700}
.comparison-table .worst{color:var(--red);opacity:0.6}
.dot-score{display:flex;gap:2px}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(0,0,0,0.06)}
.dot.filled{background:var(--accent)}

/* Notes section */
.notes-card{background:var(--card);border-radius:14px;padding:1.25rem;border:1px solid rgba(0,0,0,0.06);margin-bottom:1.5rem}
.notes-card h3{font-size:0.95rem;font-weight:700;margin-bottom:0.75rem}
.notes-card textarea{width:100%;padding:0.6rem;background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.06);border-radius:8px;color:#fff;font-family:inherit;font-size:0.85rem;min-height:80px;resize:vertical}
.notes-card textarea:focus{outline:none;border-color:var(--accent)}

/* SWOT */
.swot-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:1.5rem}
.swot-card{border-radius:12px;padding:1rem;border:1px solid rgba(0,0,0,0.06)}
.swot-card h4{font-size:0.85rem;font-weight:700;margin-bottom:0.5rem;display:flex;align-items:center;gap:0.4rem}
.swot-card ul{list-style:none;font-size:0.82rem;color:rgba(255,255,255,0.7)}
.swot-card ul li{padding:0.2rem 0;display:flex;align-items:flex-start;gap:0.3rem}
.swot-s{background:rgba(46,204,113,0.08);border-color:rgba(46,204,113,0.2)}
.swot-w{background:rgba(231,76,60,0.08);border-color:rgba(231,76,60,0.2)}
.swot-o{background:rgba(52,152,219,0.08);border-color:rgba(52,152,219,0.2)}
.swot-t{background:rgba(243,156,18,0.08);border-color:rgba(243,156,18,0.2)}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal-overlay.show{display:flex}
.modal{background:var(--bg);border:1px solid rgba(0,0,0,0.06);border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid rgba(0,0,0,0.06)}
.modal-header h3{font-size:1.1rem;font-weight:700}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer}
.modal-body{padding:1.5rem}
.modal-footer{padding:1rem 1.5rem;border-top:1px solid rgba(0,0,0,0.06);display:flex;justify-content:flex-end;gap:0.75rem}
.form-group{margin-bottom:0.85rem}
.form-group label{display:block;font-size:0.78rem;color:var(--muted);margin-bottom:0.3rem;font-weight:600}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:0.55rem 0.8rem;background:var(--card);border:1px solid rgba(0,0,0,0.06);border-radius:8px;color:#fff;font-size:0.85rem;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}
.score-input{display:flex;flex-direction:column;gap:0.2rem}
.score-input label{font-size:0.72rem;color:var(--muted)}
.score-input input[type=range]{width:100%;accent-color:var(--accent)}
.score-input .range-val{font-size:0.8rem;font-weight:700;text-align:center}

@media(max-width:800px){
  .comp-grid{grid-template-columns:1fr}
  .swot-grid{grid-template-columns:1fr}
  .main{padding:1rem}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a href="nastroje.html" class="back-link">← Nástroje</a>
    <h1>🔎 Analýza <span>konkurence</span></h1>
  </div>
  <div style="display:flex;gap:0.75rem">
    <button class="btn btn-secondary btn-sm" onclick="loadDemo()">🎯 Demo</button>
    <button class="btn btn-secondary btn-sm" onclick="exportAnalysis()">📤 Export</button>
    <button class="btn btn-primary" onclick="openCompModal()">+ Přidat konkurenta</button>
  </div>
</div>

<div class="main">

  <div class="project-bar">
    <select id="projectSelect" onchange="switchProject()"></select>
    <button class="btn btn-secondary btn-sm" onclick="newProject()">+ Nový projekt</button>
  </div>

  <div class="comp-grid" id="compGrid"></div>

  <!-- Comparison table -->
  <div class="comparison-section" id="comparisonSection" style="display:none">
    <h2>📊 Srovnání</h2>
    <div style="overflow-x:auto;border-radius:12px;border:1px solid rgba(0,0,0,0.06)">
      <table class="comparison-table" id="compTable"></table>
    </div>
  </div>

  <!-- SWOT -->
  <div id="swotSection" style="display:none">
    <h2 style="font-size:1.1rem;font-weight:700;margin-bottom:1rem">🎯 SWOT analýza klienta</h2>
    <div class="swot-grid" id="swotGrid"></div>
  </div>

  <!-- Notes -->
  <div class="notes-card">
    <h3>📝 Strategické poznámky</h3>
    <textarea id="stratNotes" placeholder="Volné poznámky ke konkurenční strategii, příležitosti, hrozby..." oninput="saveNotes()"></textarea>
  </div>

</div>

<!-- Competitor Modal -->
<div class="modal-overlay" id="compModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="compModalTitle">Přidat konkurenta</h3>
      <button class="modal-close" onclick="closeCompModal()">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="fCompId">
      <div class="form-group">
        <label>Název firmy / webu *</label>
        <input type="text" id="fCompName" placeholder="Konkurent s.r.o.">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>URL webu</label>
          <input type="url" id="fCompUrl" placeholder="https://...">
        </div>
        <div class="form-group">
          <label>Typ</label>
          <select id="fCompType">
            <option value="competitor">🎯 Konkurent</option>
            <option value="our">⭐ Náš klient</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Barva karty</label>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap" id="colorPicker"></div>
      </div>

      <h4 style="font-size:0.9rem;margin:1rem 0 0.75rem;color:var(--accent-light)">Hodnocení (1–10)</h4>
      <div id="scoreInputs"></div>

      <div class="form-group" style="margin-top:1rem">
        <label>Silné stránky</label>
        <textarea id="fCompStrengths" rows="2" placeholder="Čím vynikají..."></textarea>
      </div>
      <div class="form-group">
        <label>Slabé stránky</label>
        <textarea id="fCompWeaknesses" rows="2" placeholder="Kde zaostávají..."></textarea>
      </div>
      <div class="form-group">
        <label>Poznámky</label>
        <textarea id="fCompNotes" rows="2" placeholder="Ceny, strategie, zajímavosti..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeCompModal()">Zrušit</button>
      <button class="btn btn-danger btn-sm" id="deleteCompBtn" onclick="deleteComp()" style="display:none">🗑️</button>
      <button class="btn btn-primary" onclick="saveComp()">💾 Uložit</button>
    </div>
  </div>
</div>

<script>
const CRITERIA = [
  { id:'web', label:'Kvalita webu', icon:'🌐' },
  { id:'seo', label:'SEO / viditelnost', icon:'🔍' },
  { id:'social', label:'Sociální sítě', icon:'📱' },
  { id:'design', label:'Design & UX', icon:'🎨' },
  { id:'price', label:'Cenová konkurenceschopnost', icon:'💰' },
  { id:'content', label:'Kvalita obsahu', icon:'📝' },
  { id:'reviews', label:'Recenze / reputace', icon:'⭐' },
  { id:'speed', label:'Rychlost webu', icon:'⚡' },
];

const COLORS = ['#e94560','#3498db','#2ecc71','#f39c12','#9b59b6','#e67e22','#1abc9c','#e74c3c','#2980b9','#8e44ad'];

let projects = [];
let currentProject = null;

function init() {
  const saved = sessionStorage.getItem('kudli_competitors');
  if (saved) {
    const data = JSON.parse(saved);
    projects = data.projects || [];
    currentProject = data.currentProject || null;
  }
  if (projects.length === 0) {
    loadDemo();
    return;
  }
  renderProjectSelect();
  renderAll();
}

function save() {
  sessionStorage.setItem('kudli_competitors', JSON.stringify({ projects, currentProject }));
}

function renderProjectSelect() {
  const sel = document.getElementById('projectSelect');
  sel.innerHTML = projects.map(p => `<option value="${p.id}" ${p.id === currentProject ? 'selected' : ''}>${p.name}</option>`).join('');
}

function switchProject() {
  currentProject = document.getElementById('projectSelect').value;
  save();
  renderAll();
}

function getProject() {
  return projects.find(p => p.id === currentProject) || projects[0];
}

function newProject() {
  const name = prompt('Název projektu (klienta):');
  if (!name) return;
  const p = { id: 'p' + Date.now(), name, competitors: [], notes: '' };
  projects.push(p);
  currentProject = p.id;
  save();
  renderProjectSelect();
  renderAll();
}

function renderAll() {
  const project = getProject();
  if (!project) return;

  renderCompGrid(project);
  renderComparison(project);
  renderSWOT(project);
  document.getElementById('stratNotes').value = project.notes || '';
}

function renderCompGrid(project) {
  const grid = document.getElementById('compGrid');
  if (!project.competitors || project.competitors.length === 0) {
    grid.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--muted);grid-column:1/-1"><div style="font-size:3rem;margin-bottom:1rem">🔎</div><p>Přidejte prvního konkurenta</p><button class="btn btn-primary" style="margin-top:1rem" onclick="openCompModal()">+ Přidat</button></div>';
    document.getElementById('comparisonSection').style.display = 'none';
    document.getElementById('swotSection').style.display = 'none';
    return;
  }

  grid.innerHTML = project.competitors.map(c => {
    const initial = (c.name || '?')[0].toUpperCase();
    const avgScore = CRITERIA.reduce((s, cr) => s + (c.scores?.[cr.id] || 0), 0) / CRITERIA.length;

    return `
    <div class="comp-card ${c.type === 'our' ? 'our' : ''}">
      <div class="comp-actions">
        <button class="comp-action" onclick="editComp('${c.id}')" title="Upravit">✏️</button>
      </div>
      <div class="comp-header">
        <div class="comp-avatar" style="background:${c.color || '#e94560'}">${initial}</div>
        <div>
          <div class="comp-name">${c.name}</div>
          <div class="comp-url">${c.url ? `<a href="${c.url}" target="_blank">${c.url.replace('https://','').replace('http://','')}</a>` : 'Bez URL'}</div>
        </div>
      </div>
      <div class="score-section">
        ${CRITERIA.map(cr => {
          const val = c.scores?.[cr.id] || 0;
          const color = val >= 7 ? 'var(--green)' : val >= 4 ? 'var(--orange)' : 'var(--red)';
          return `
          <div class="score-row">
            <span class="score-label">${cr.icon} ${cr.label}</span>
            <div class="score-bar"><div class="score-bar-fill" style="width:${val*10}%;background:${color}"></div></div>
            <span class="score-val" style="color:${color}">${val}</span>
          </div>`;
        }).join('')}
      </div>
      <div style="text-align:center;margin-top:0.5rem;font-size:0.85rem;font-weight:700;color:${avgScore >= 7 ? 'var(--green)' : avgScore >= 4 ? 'var(--orange)' : 'var(--red)'}">
        Průměr: ${avgScore.toFixed(1)}/10
      </div>
      ${c.strengths ? `<div class="comp-tags" style="margin-top:0.5rem">${c.strengths.split(',').map(s => `<span class="ctag" style="background:rgba(46,204,113,0.15);color:var(--green)">💪 ${s.trim()}</span>`).join('')}</div>` : ''}
      ${c.weaknesses ? `<div class="comp-tags">${c.weaknesses.split(',').map(s => `<span class="ctag" style="background:rgba(231,76,60,0.15);color:var(--red)">⚠️ ${s.trim()}</span>`).join('')}</div>` : ''}
    </div>`;
  }).join('');
}

function renderComparison(project) {
  if (!project.competitors || project.competitors.length < 2) {
    document.getElementById('comparisonSection').style.display = 'none';
    return;
  }
  document.getElementById('comparisonSection').style.display = 'block';

  const comps = project.competitors;
  let html = '<thead><tr><th>Kritérium</th>';
  comps.forEach(c => { html += `<th style="color:${c.color || '#e94560'}">${c.name}</th>`; });
  html += '</tr></thead><tbody>';

  CRITERIA.forEach(cr => {
    const vals = comps.map(c => c.scores?.[cr.id] || 0);
    const maxVal = Math.max(...vals);
    const minVal = Math.min(...vals);
    html += `<tr><td class="cat-label">${cr.icon} ${cr.label}</td>`;
    comps.forEach((c, i) => {
      const val = vals[i];
      const cls = val === maxVal && maxVal > 0 ? 'best' : val === minVal && comps.length > 2 ? 'worst' : '';
      html += `<td class="${cls}"><div class="dot-score">${Array(10).fill(0).map((_, j) => `<span class="dot ${j < val ? 'filled' : ''}" style="${j < val ? `background:${c.color || 'var(--accent)'}` : ''}"></span>`).join('')}</div><span style="font-size:0.75rem;margin-left:0.3rem">${val}/10</span></td>`;
    });
    html += '</tr>';
  });

  // Total row
  html += '<tr style="font-weight:700;border-top:2px solid rgba(0,0,0,0.06)"><td>PRŮMĚR</td>';
  comps.forEach(c => {
    const avg = CRITERIA.reduce((s, cr) => s + (c.scores?.[cr.id] || 0), 0) / CRITERIA.length;
    html += `<td style="color:${c.color || 'var(--accent)'};font-size:1.1rem">${avg.toFixed(1)}</td>`;
  });
  html += '</tr></tbody>';

  document.getElementById('compTable').innerHTML = html;
}

function renderSWOT(project) {
  const ourClient = project.competitors?.find(c => c.type === 'our');
  if (!ourClient) {
    document.getElementById('swotSection').style.display = 'none';
    return;
  }
  document.getElementById('swotSection').style.display = 'block';

  const competitors = project.competitors.filter(c => c.type !== 'our');
  const ourScores = CRITERIA.map(cr => ({ ...cr, val: ourClient.scores?.[cr.id] || 0 }));

  // Auto-generate SWOT
  const strengths = ourScores.filter(s => s.val >= 7).map(s => `${s.icon} ${s.label} (${s.val}/10)`);
  const weaknesses = ourScores.filter(s => s.val <= 4).map(s => `${s.icon} ${s.label} (${s.val}/10)`);

  const opportunities = [];
  const threats = [];
  competitors.forEach(comp => {
    CRITERIA.forEach(cr => {
      const ourVal = ourClient.scores?.[cr.id] || 0;
      const theirVal = comp.scores?.[cr.id] || 0;
      if (theirVal <= 3 && ourVal >= 5) opportunities.push(`${cr.icon} ${comp.name}: slabé v ${cr.label}`);
      if (theirVal >= 8 && ourVal < theirVal) threats.push(`${cr.icon} ${comp.name}: silné v ${cr.label} (${theirVal}/10)`);
    });
  });

  if (ourClient.strengths) ourClient.strengths.split(',').forEach(s => strengths.push(`💪 ${s.trim()}`));
  if (ourClient.weaknesses) ourClient.weaknesses.split(',').forEach(s => weaknesses.push(`⚠️ ${s.trim()}`));

  document.getElementById('swotGrid').innerHTML = `
    <div class="swot-card swot-s"><h4>💪 Silné stránky</h4><ul>${strengths.length ? strengths.map(s => `<li>${s}</li>`).join('') : '<li style="color:var(--muted)">Žádné identifikované</li>'}</ul></div>
    <div class="swot-card swot-w"><h4>⚠️ Slabé stránky</h4><ul>${weaknesses.length ? weaknesses.map(s => `<li>${s}</li>`).join('') : '<li style="color:var(--muted)">Žádné identifikované</li>'}</ul></div>
    <div class="swot-card swot-o"><h4>🚀 Příležitosti</h4><ul>${opportunities.length ? [...new Set(opportunities)].slice(0,5).map(s => `<li>${s}</li>`).join('') : '<li style="color:var(--muted)">Přidejte konkurenty pro analýzu</li>'}</ul></div>
    <div class="swot-card swot-t"><h4>⚡ Hrozby</h4><ul>${threats.length ? [...new Set(threats)].slice(0,5).map(s => `<li>${s}</li>`).join('') : '<li style="color:var(--muted)">Přidejte konkurenty pro analýzu</li>'}</ul></div>
  `;
}

// Modal
function openCompModal(editId) {
  document.getElementById('fCompId').value = '';
  document.getElementById('compModalTitle').textContent = 'Přidat konkurenta';
  document.getElementById('fCompName').value = '';
  document.getElementById('fCompUrl').value = '';
  document.getElementById('fCompType').value = 'competitor';
  document.getElementById('fCompStrengths').value = '';
  document.getElementById('fCompWeaknesses').value = '';
  document.getElementById('fCompNotes').value = '';
  document.getElementById('deleteCompBtn').style.display = 'none';

  // Color picker
  let selectedColor = COLORS[Math.floor(Math.random() * COLORS.length)];
  renderColorPicker(selectedColor);

  // Score inputs
  renderScoreInputs({});
  document.getElementById('compModal').classList.add('show');
}

function editComp(id) {
  const project = getProject();
  const c = project.competitors.find(x => x.id === id);
  if (!c) return;

  document.getElementById('fCompId').value = id;
  document.getElementById('compModalTitle').textContent = 'Upravit: ' + c.name;
  document.getElementById('fCompName').value = c.name || '';
  document.getElementById('fCompUrl').value = c.url || '';
  document.getElementById('fCompType').value = c.type || 'competitor';
  document.getElementById('fCompStrengths').value = c.strengths || '';
  document.getElementById('fCompWeaknesses').value = c.weaknesses || '';
  document.getElementById('fCompNotes').value = c.notes || '';
  document.getElementById('deleteCompBtn').style.display = 'inline-flex';

  renderColorPicker(c.color || COLORS[0]);
  renderScoreInputs(c.scores || {});
  document.getElementById('compModal').classList.add('show');
}

function renderColorPicker(selected) {
  document.getElementById('colorPicker').innerHTML = COLORS.map(c =>
    `<div style="width:28px;height:28px;border-radius:8px;background:${c};cursor:pointer;border:2px solid ${c === selected ? '#fff' : 'transparent'};transition:border 0.3s" onclick="selectColor(this,'${c}')"></div>`
  ).join('');
  document.getElementById('colorPicker').dataset.selected = selected;
}

function selectColor(el, color) {
  document.querySelectorAll('#colorPicker div').forEach(d => d.style.borderColor = 'transparent');
  el.style.borderColor = '#fff';
  document.getElementById('colorPicker').dataset.selected = color;
}

function renderScoreInputs(scores) {
  document.getElementById('scoreInputs').innerHTML = CRITERIA.map(cr => {
    const val = scores[cr.id] || 5;
    return `
    <div class="score-input" style="margin-bottom:0.5rem">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <label>${cr.icon} ${cr.label}</label>
        <span class="range-val" id="rv_${cr.id}">${val}</span>
      </div>
      <input type="range" min="1" max="10" value="${val}" id="si_${cr.id}" oninput="document.getElementById('rv_${cr.id}').textContent=this.value">
    </div>`;
  }).join('');
}

function closeCompModal() {
  document.getElementById('compModal').classList.remove('show');
}

function saveComp() {
  const project = getProject();
  if (!project) return;

  const name = document.getElementById('fCompName').value.trim();
  if (!name) { alert('Zadejte název'); return; }

  const scores = {};
  CRITERIA.forEach(cr => { scores[cr.id] = parseInt(document.getElementById('si_' + cr.id).value); });

  const data = {
    name,
    url: document.getElementById('fCompUrl').value.trim(),
    type: document.getElementById('fCompType').value,
    color: document.getElementById('colorPicker').dataset.selected || COLORS[0],
    scores,
    strengths: document.getElementById('fCompStrengths').value.trim(),
    weaknesses: document.getElementById('fCompWeaknesses').value.trim(),
    notes: document.getElementById('fCompNotes').value.trim(),
  };

  const editId = document.getElementById('fCompId').value;
  if (editId) {
    const idx = project.competitors.findIndex(c => c.id === editId);
    if (idx >= 0) project.competitors[idx] = { ...project.competitors[idx], ...data };
  } else {
    data.id = 'c' + Date.now();
    if (!project.competitors) project.competitors = [];
    project.competitors.push(data);
  }

  save();
  closeCompModal();
  renderAll();
}

function deleteComp() {
  const editId = document.getElementById('fCompId').value;
  if (!editId || !confirm('Smazat tohoto konkurenta?')) return;
  const project = getProject();
  project.competitors = project.competitors.filter(c => c.id !== editId);
  save();
  closeCompModal();
  renderAll();
}

function saveNotes() {
  const project = getProject();
  if (project) {
    project.notes = document.getElementById('stratNotes').value;
    save();
  }
}

function exportAnalysis() {
  const project = getProject();
  if (!project) return;
  const blob = new Blob([JSON.stringify(project, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `konkurence-${project.name.replace(/\s+/g,'-').toLowerCase()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
