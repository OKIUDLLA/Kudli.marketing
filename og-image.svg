<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b81"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="200" fill="#e94560" opacity="0.05"/>
  <circle cx="150" cy="530" r="150" fill="#e94560" opacity="0.05"/>
  <!-- Brand -->
  <text x="100" y="260" font-family="system-ui,-apple-system,sans-serif" font-weight="900" font-size="96" fill="#ffffff">Kudli</text>
  <text x="478" y="260" font-family="system-ui,-apple-system,sans-serif" font-weight="900" font-size="96" fill="#e94560">.</text>
  <text x="100" y="340" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="56" fill="rgba(255,255,255,0.6)">marketing</text>
  <!-- Tagline -->
  <text x="100" y="440" font-family="system-ui,-apple-system,sans-serif" font-weight="600" font-size="32" fill="rgba(255,255,255,0.5)">Webový vývoj · Automatizace · AI řešení</text>
  <!-- Accent line -->
  <rect x="100" y="170" width="80" height="5" rx="3" fill="url(#accent)"/>
  <!-- Dot -->
  <circle cx="1020" cy="180" r="30" fill="#e94560"/>
</svg>
