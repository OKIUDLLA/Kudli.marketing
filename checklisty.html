<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F5F3EE;--card:#FFFFFF;--accent:#1A1A1A;--accent-light:#333;--green:#2ecc71;--text:#1A1A1A;--muted:#888}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.top-bar{display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem;border-bottom:1px solid rgba(0,0,0,0.06);flex-wrap:wrap;gap:1rem}
.top-bar .logo{font-weight:800;font-size:1.2rem;text-decoration:none;color:var(--text)}
.top-bar .logo span{color:var(--accent)}
.top-bar .badge{background:rgba(26,26,26,0.08);color:var(--accent);padding:0.25rem 0.75rem;border-radius:15px;font-size:0.75rem;font-weight:600}

.container{max-width:900px;margin:0 auto;padding:2rem 1.5rem}

.header{text-align:center;margin-bottom:2rem}
.header h1{font-size:2rem;font-weight:800}
.header h1 em{color:var(--accent);font-style:normal}
.header p{color:var(--muted);margin-top:0.5rem}

/* Project type selector */
.type-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:0.75rem;margin-bottom:2rem}
.type-btn{background:var(--card);border:2px solid rgba(0,0,0,0.06);border-radius:14px;padding:1rem;text-align:center;cursor:pointer;transition:all 0.3s;user-select:none}
.type-btn:hover{border-color:rgba(233,69,96,0.4);transform:translateY(-2px)}
.type-btn.active{border-color:var(--accent);background:rgba(233,69,96,0.1)}
.type-btn .icon{font-size:1.8rem;margin-bottom:0.3rem}
.type-btn .name{font-size:0.85rem;font-weight:600}
.type-btn .count{font-size:0.7rem;color:var(--muted);margin-top:0.15rem}

/* Progress bar */
.progress-section{background:var(--card);border-radius:14px;padding:1.25rem;margin-bottom:1.5rem;border:1px solid rgba(0,0,0,0.06)}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem}
.progress-header .title{font-weight:700;font-size:1rem}
.progress-header .pct{font-size:1.5rem;font-weight:800;color:var(--accent)}
.progress-bar-bg{height:10px;background:rgba(0,0,0,0.06);border-radius:5px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent),var(--accent-light));transition:width 0.6s cubic-bezier(0.22,1,0.36,1)}
.progress-stats{display:flex;gap:1.5rem;margin-top:0.75rem;font-size:0.8rem;color:var(--muted)}

/* Checklist phases */
.phase{margin-bottom:1.5rem}
.phase-header{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 0;cursor:pointer;user-select:none;border-bottom:1px solid rgba(0,0,0,0.06)}
.phase-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.phase-info{flex:1}
.phase-info h3{font-size:0.95rem;font-weight:700}
.phase-info .sub{font-size:0.75rem;color:var(--muted)}
.phase-pct{font-size:0.85rem;font-weight:700;color:var(--accent-light)}
.phase-toggle{font-size:1rem;color:var(--muted);transition:transform 0.3s}
.phase.open .phase-toggle{transform:rotate(180deg)}

.task-list{display:none;padding:0.5rem 0 0.5rem 3rem}
.phase.open .task-list{display:block}

.task-item{display:flex;align-items:flex-start;gap:0.75rem;padding:0.5rem 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.task-item:last-child{border:none}
.task-cb{width:22px;height:22px;border-radius:6px;border:2px solid rgba(255,255,255,0.2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.3s;margin-top:1px}
.task-cb.done{background:var(--green);border-color:var(--green)}
.task-cb.done::after{content:'✓';font-size:0.75rem;color:#fff;font-weight:700}
.task-text{flex:1;font-size:0.9rem;line-height:1.5;transition:all 0.3s}
.task-item.completed .task-text{text-decoration:line-through;color:var(--muted)}
.task-note{font-size:0.75rem;color:var(--muted);display:block;margin-top:0.15rem;font-style:italic}

/* Actions */
.actions{display:flex;gap:0.75rem;margin-top:1rem;flex-wrap:wrap}
.btn{padding:0.55rem 1.25rem;border:none;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.3s}
.btn-primary{background:var(--accent);color:#F5F3EE}
.btn-primary:hover{background:var(--accent-light);transform:translateY(-1px)}
.btn-ghost{background:rgba(0,0,0,0.04);color:var(--text)}
.btn-ghost:hover{background:rgba(0,0,0,0.08)}

.toast{position:fixed;bottom:2rem;right:2rem;background:var(--green);color:#F5F3EE;padding:0.7rem 1.5rem;border-radius:10px;font-weight:600;font-size:0.85rem;transform:translateY(100px);opacity:0;transition:all 0.4s;z-index:100}
.toast.show{transform:translateY(0);opacity:1}

@media(max-width:600px){
 .type-grid{grid-template-columns:1fr 1fr}
 .task-list{padding-left:1rem}
}
</style>
</head>

let currentType = null;
let checkState = {};

function init() {
 const grid = document.getElementById('typeGrid');
 Object.entries(PROJECTS).forEach(([key, proj]) => {
   const totalTasks = proj.phases.reduce((s,p) => s + p.tasks.length, 0);
   const div = document.createElement('div');
   div.className = 'type-btn';
   div.dataset.type = key;
   div.onclick = () => selectType(key);
   div.innerHTML = `<div class="icon">${proj.icon}</div><div class="name">${proj.name}</div><div class="count">${totalTasks} kroků</div>`;
   grid.appendChild(div);
 });
 loadState();
}

function selectType(type) {
 currentType = type;
 document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === type));
 document.getElementById('progressSection').style.display = 'block';
 document.getElementById('actionsBar').style.display = 'flex';
 renderPhases();
 updateProgress();
}

function renderPhases() {
 const proj = PROJECTS[currentType];
 const container = document.getElementById('phasesContainer');
 container.innerHTML = '';

 proj.phases.forEach((phase, pi) => {
   const div = document.createElement('div');
   div.className = 'phase open';
   div.innerHTML = `
     <div class="phase-header" onclick="this.parentElement.classList.toggle('open')">
       <div class="phase-icon" style="background:rgba(${hexToRgb(proj.color)},0.15);color:${proj.color}">${phase.icon}</div>
       <div class="phase-info">
         <h3>Fáze ${pi+1}: ${phase.name}</h3>
         <div class="sub">${phase.tasks.length} kroků</div>
       </div>
       <span class="phase-pct" id="phasePct-${pi}">0%</span>
       <span class="phase-toggle">▼</span>
     </div>
     <div class="task-list">
       ${phase.tasks.map((t, ti) => {
         const key = `${currentType}-${pi}-${ti}`;
         const done = checkState[key] || false;
         return `<div class="task-item ${done?'completed':''}" id="task-${key}">
           <div class="task-cb ${done?'done':''}" onclick="toggleTask('${key}')"></div>
           <div>
             <span class="task-text">${t.text}</span>
             ${t.note ? `<span class="task-note">${t.note}</span>` : ''}
           </div>
         </div>`;
       }).join('')}
     </div>
   `;
   container.appendChild(div);
 });
}

function toggleTask(key) {
 checkState[key] = !checkState[key];
 const item = document.getElementById(`task-${key}`);
 const cb = item.querySelector('.task-cb');
 if (checkState[key]) {
   item.classList.add('completed');
   cb.classList.add('done');
 } else {
   item.classList.remove('completed');
   cb.classList.remove('done');
 }
 saveState();
 updateProgress();
}

function updateProgress() {
 const proj = PROJECTS[currentType];
 let total = 0, done = 0;

 proj.phases.forEach((phase, pi) => {
   let pDone = 0;
   phase.tasks.forEach((t, ti) => {
     total++;
     const key = `${currentType}-${pi}-${ti}`;
     if (checkState[key]) { done++; pDone++; }
   });
   const pPct = phase.tasks.length > 0 ? Math.round((pDone / phase.tasks.length) * 100) : 0;
   const el = document.getElementById(`phasePct-${pi}`);
   if (el) el.textContent = pPct + '%';
 });

 const pct = total > 0 ? Math.round((done / total) * 100) : 0;
 document.getElementById('progressTitle').textContent = PROJECTS[currentType].name;
 document.getElementById('progressPct').textContent = pct + '%';
 document.getElementById('progressBar').style.width = pct + '%';
 document.getElementById('statDone').textContent = done;
 document.getElementById('statRemaining').textContent = total - done;
 document.getElementById('statTotal').textContent = total;
}

function resetChecklist() {
 if (!confirm('Opravdu resetovat všechny kroky pro tento typ projektu?')) return;
 const proj = PROJECTS[currentType];
 proj.phases.forEach((phase, pi) => {
   phase.tasks.forEach((t, ti) => {
     delete checkState[`${currentType}-${pi}-${ti}`];
   });
 });
 saveState();
 renderPhases();
 updateProgress();
 showToast('🔄 Checklist resetován');
}

function printChecklist() {

 proj.phases.forEach((phase, pi) => {
   text += `${phase.icon} FÁZE ${pi+1}: ${phase.name}\n`;
   phase.tasks.forEach((t, ti) => {
     const key = `${currentType}-${pi}-${ti}`;
     text += `  ${checkState[key] ? '✅' : '⬜'} ${t.text}\n`;
   });
   text += '\n';
 });
 const w = window.open('','','width=700,height=900');
 w.document.write(`<pre style="font-family:monospace;font-size:14px;line-height:1.8;padding:2rem">${text}</pre>`);
 w.document.close();
 w.print();
}

function copyChecklist() {
 const proj = PROJECTS[currentType];
 let text = `CHECKLIST: ${proj.name}\n\n`;
 proj.phases.forEach((phase, pi) => {
   text += `${phase.icon} Fáze ${pi+1}: ${phase.name}\n`;
   phase.tasks.forEach((t, ti) => {
     const key = `${currentType}-${pi}-${ti}`;
     text += `  ${checkState[key] ? '✅' : '☐'} ${t.text}\n`;
   });
   text += '\n';
 });
 navigator.clipboard.writeText(text).then(() => showToast('📋 Checklist zkopírován'));
}

function saveState() {
 try { sessionStorage.setItem('kudli_checklists', JSON.stringify(checkState)); } catch(e) {}
}
function loadState() {
 try {
   const d = sessionStorage.getItem('kudli_checklists');
   if (d) checkState = JSON.parse(d);
 } catch(e) {}
}

function hexToRgb(hex) {
 const r = parseInt(hex.slice(1,3),16);
 const g = parseInt(hex.slice(3,5),16);
 const b = parseInt(hex.slice(5,7),16);
 return `${r},${g},${b}`;
}

function showToast(msg) {
 const t = document.getElementById('toast');
 t.textContent = msg;
 t.classList.add('show');
 setTimeout(() => t.classList.remove('show'), 2500);
}

init();
