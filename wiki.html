.form-group input,.form-group select,.form-group textarea{width:100%;padding:0.6rem;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:var(--text);font-size:0.9rem;font-family:inherit}

    {id:1,title:'Jak nastavit Google Analytics 4',cat:'analytics',date:'2026-02-28',views:15,body:`
<h3>Proč GA4?</h3>
<p>Google Analytics 4 je nová generace analytického nástroje od Googlu. Oproti Universal Analytics nabízí lepší sledování across-device, prediktivní metriky a integraci s Google Ads.</p>

<h3>Krok za krokem</h3>
<ol>
<li>Přejděte na <code>analytics.google.com</code> a klikněte na "Vytvořit účet"</li>
<li>Zadejte název účtu (název firmy klienta)</li>
<li>Vytvořte property — zadejte URL webu, časové pásmo CET, měnu CZK</li>
<li>Zkopírujte Measurement ID (formát G-XXXXXXXXX)</li>
<li>Vložte tracking kód do <code>&lt;head&gt;</code> sekce webu</li>
</ol>

<div class="tip">Pro WordPress použijte plugin "Site Kit by Google" — nastaví GA4, Search Console i AdSense najednou.</div>

<h3>Důležité události k nastavení</h3>
<ul>
<li><strong>page_view</strong> — automaticky sledováno</li>
<li><strong>scroll</strong> — Enhanced Measurement (zapnout v nastavení)</li>
<li><strong>click</strong> — odchozí odkazy, automaticky</li>
<li><strong>form_submit</strong> — nutno nastavit custom event</li>
<li><strong>purchase</strong> — pro e-shopy, enhanced ecommerce</li>
</ul>

<h3>Konverze</h3>
<p>V GA4 se konverze nastavují přes Events → označte událost jako konverzi. Typické konverze pro klienty: odeslání formuláře, telefonní hovor, dokončení objednávky.</p>

<div class="warning">GA4 nezachovává data déle než 14 měsíců v explorativních reportech. Pro delší analýzy exportujte do BigQuery.</div>`},

    {id:2,title:'Checklist: SEO audit webu',cat:'seo',date:'2026-02-25',views:22,body:`
<h3>Technické SEO</h3>
<ul>
<li>Kontrola indexace: <code>site:domena.cz</code> v Googlu</li>
<li>Robots.txt — správně nastavený, neblokuje důležité stránky</li>
<li>Sitemap.xml — existuje, je aktuální, submitnutá v GSC</li>
<li>HTTPS — celý web na HTTPS, žádný mixed content</li>
<li>Rychlost — Core Web Vitals v PageSpeed Insights (cíl: zelené skóre)</li>
<li>Mobile-friendly — test v Google Mobile-Friendly Tool</li>

</ul>

<h3>On-page SEO</h3>
<ul>
<li>Title tagy — unikátní, max 60 znaků, klíčové slovo na začátku</li>
<li>Meta description — unikátní, max 160 znaků, CTA</li>
<li>H1 — jeden na stránku, obsahuje klíčové slovo</li>
<li>URL struktura — čistá, krátká, s klíčovým slovem</li>
<li>Interní prolinkování — logická struktura, anchor texty</li>
<li>Obrázky — alt tagy, komprese, WebP formát</li>
</ul>

<h3>Content</h3>
<ul>

    {id:3,title:'Jak psát efektivní PPC reklamy',cat:'ppc',date:'2026-02-20',views:18,body:`
<h3>Struktura Google Ads účtu</h3>
<p>Správná struktura je základ úspěchu. Rozdělte kampaně podle typu služby/produktu, reklamní sestavy podle záměru uživatele.</p>

<h3>Pravidla pro psaní nadpisů</h3>
<ul>
<li>Nadpis 1: Klíčové slovo + benefit (max 30 znaků)</li>
<li>Nadpis 2: USP nebo nabídka</li>
<li>Nadpis 3: CTA nebo značka</li>
</ul>

<blockquote>Příklad: "Tvorba webů od 8 900 Kč | Moderní design za 14 dní | Kudli. marketing"</blockquote>

<h3>Tipy pro vyšší CTR</h3>
<ul>
<li>Použijte čísla a konkrétní údaje</li>
<li>Přidejte rozšíření (sitelinks, callout, structured snippets)</li>
<li>Testujte min. 3 varianty reklam v každé sestavě</li>
<li>Dynamické vkládání klíčových slov: <code>{KeyWord:Výchozí text}</code></li>
</ul>

<div class="warning">Nikdy nesměřujte reklamy na homepage. Vždy vytvořte specifickou landing page pro každou kampaň.</div>

<h3>Rozpočet pro malé firmy</h3>
<p>Doporučený minimální denní rozpočet: 200–500 Kč. Start s přesnými shodami (exact match), postupně rozšiřovat na phrase match. Negativní klíčová slova přidávat každý týden.</p>`},

    {id:4,title:'Strategie pro Instagram marketing',cat:'social',date:'2026-02-18',views:12,body:`
<h3>Content pillars</h3>
<p>Každý klientský účet by měl mít 3-5 content pilířů — opakující se témata, která budují značku:</p>
<ul>
<li><strong>Edukační</strong> — tipy, návody, how-to</li>
<li><strong>Behind the scenes</strong> — autenticita, lidskost</li>
<li><strong>Sociální důkaz</strong> — reference, výsledky, before/after</li>
<li><strong>Zábava</strong> — memes, trendy, reels</li>
<li><strong>Prodejní</strong> — nabídky, CTA (max 20% obsahu)</li>
</ul>

<h3>Optimální frekvence</h3>
<ul>
<li>Feed posty: 3-4× týdně</li>
<li>Stories: denně (min. 3-5 stories)</li>
<li>Reels: 2-3× týdně (nejvyšší organický dosah)</li>
<li>Carousel: 1-2× týdně (nejvyšší engagement)</li>
</ul>

<h3>Hashtag strategie</h3>
<p>Používejte mix 15-20 hashtagů: 5 velkých (100k+ příspěvků), 10 středních (10-100k), 5 niche (pod 10k). Rotujte sady hashtagů každý týden.</p>

<div class="tip">Nejlepší čas pro publikaci v ČR: úterý-čtvrtek, 11:00-13:00 a 18:00-20:00. Vždy ověřte v Insights konkrétního účtu.</div>`},

    {id:5,title:'Jak připravit nabídku, která prodává',cat:'sales',date:'2026-02-15',views:20,body:`
<h3>Struktura vítězné nabídky</h3>
<ol>
<li><strong>Problém klienta</strong> — ukažte, že rozumíte jejich situaci</li>
<li><strong>Vaše řešení</strong> — konkrétní kroky, ne abstraktní sliby</li>
<li><strong>Očekávané výsledky</strong> — čísla, metriky, ROI odhad</li>
<li><strong>Rozsah a harmonogram</strong> — co přesně, kdy</li>
<li><strong>Investice</strong> — cena + co je v ní zahrnuto</li>
<li><strong>Další kroky</strong> — jasné CTA, termín platnosti</li>
</ol>

<h3>Cenová psychologie</h3>
<ul>
<li>Vždy nabízejte 3 balíčky (kotevní efekt)</li>
<li>Prostřední balíček = ten, který chcete prodat</li>
<li>Neuvádějte hodinovou sazbu — vždy projektová cena</li>
<li>Ukažte ROI: "Investice 19 900 Kč → očekávaný přínos 80 000+ Kč"</li>
</ul>

<blockquote>Klienti nekupují hodiny práce. Kupují výsledky a pocit jistoty, že je o ně postaráno.</blockquote>

<div class="tip">Nabídku posílejte do 48 hodin po schůzce. Každý den prodlení snižuje šanci na uzavření o 10-15%.</div>

<h3>Follow-up sekvence</h3>
<p>Den 0: Odeslání nabídky. Den 3: Follow-up email. Den 7: Telefonát. Den 14: Poslední follow-up s časově omezenou nabídkou.</p>`},

    {id:6,title:'Copywriting formule pro web',cat:'copywriting',date:'2026-02-12',views:14,body:`
<h3>AIDA formule</h3>
<ul>
<li><strong>A</strong>ttention — Upoutejte pozornost nadpisem</li>
<li><strong>I</strong>nterest — Vzbuďte zájem relevantním problémem</li>
<li><strong>D</strong>esire — Vytvořte touhu ukázáním řešení</li>
<li><strong>A</strong>ction — Výzva k akci (CTA)</li>
</ul>

<h3>PAS formule</h3>
<ul>
<li><strong>P</strong>roblem — Pojmenujte problém klienta</li>
<li><strong>A</strong>gitate — Zesílete bolest, ukažte důsledky</li>
<li><strong>S</strong>olve — Představte vaše řešení</li>
</ul>

<h3>Pravidla pro landing pages</h3>
<ul>
<li>Jeden cíl = jedno CTA na stránku</li>
<li>Nadpis musí komunikovat hlavní benefit do 3 sekund</li>
<li>Social proof nad fold (loga klientů, hodnocení)</li>
<li>Odstraňte navigaci — žádné úniky ze stránky</li>
<li>CTA button: akční text ("Získat nabídku zdarma" místo "Odeslat")</li>
</ul>

<div class="tip">Testujte nadpisy pomocí ab-test.html. I malá změna v headline může zvýšit konverzi o 20-40%.</div>`},

<ul>
<li><strong>Google Analytics 4</strong> — analytika zdarma</li>

    {id:8,title:'Proces onboardingu klienta',cat:'process',date:'2026-02-08',views:10,body:`
<h3>Fáze 1: Před podpisem</h3>
<ol>
<li>Discovery call (20 min) — potřeby, rozpočet, termín</li>
<li>Příprava nabídky v generator-nabidek.html</li>
<li>Follow-up a vyjednávání</li>
<li>Podpis smlouvy (smlouvy.html)</li>
</ol>

<h3>Fáze 2: Onboarding (den 1-3)</h3>
<ol>
<li>Welcome email (šablona v sablony.html)</li>
<li>Vytvoření složky v Google Drive</li>
<li>Přidání do CRM (crm.html)</li>
<li>Vyžádání přístupů (Analytics, hosting, sociální sítě)</li>

let articles = JSON.parse(sessionStorage.getItem('wiki_data')) || defaultArticles();
let nextId = Math.max(...articles.map(a=>a.id),0)+1;
let activeCat = 'all';

function save(){sessionStorage.setItem('wiki_data',JSON.stringify(articles))}

function getFiltered(){
  let list = articles;
  const q = document.getElementById('sideSearch').value.toLowerCase();
  if(q) list = list.filter(a=>a.title.toLowerCase().includes(q)||a.body.toLowerCase().includes(q));
  if(activeCat!=='all') list = list.filter(a=>a.cat===activeCat);
  return list.sort((a,b)=>b.views-a.views);
}

function renderSidebar(){
  const counts = {};
  articles.forEach(a=>{counts[a.cat]=(counts[a.cat]||0)+1});
  let html = `<div class="sidebar-title">Kategorie</div>`;
  html += `<div class="nav-item ${activeCat==='all'?'active':''}" onclick="setCat('all')"><span class="nav-icon">📚</span>Vše<span class="nav-count">${articles.length}</span></div>`;
  Object.entries(CAT_MAP).forEach(([k,v])=>{
    if(counts[k]){
      html += `<div class="nav-item ${activeCat===k?'active':''}" onclick="setCat('${k}')"><span class="nav-icon">${v.icon}</span>${v.label}<span class="nav-count">${counts[k]}</span></div>`;
    }
  });
  html += `<div class="sidebar-title" style="margin-top:1.5rem">Nejčtenější</div>`;
  const top3 = [...articles].sort((a,b)=>b.views-a.views).slice(0,3);
  top3.forEach(a=>{
    html += `<div class="nav-item" onclick="viewArticle(${a.id})"><span class="nav-icon">📄</span><span style="font-size:0.8rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.title}</span></div>`;
  });
  document.getElementById('sideNav').innerHTML = html;
}

function setCat(c){activeCat=c;showList();render()}

function renderGrid(){
  const list = getFiltered();
  if(!list.length){
    document.getElementById('articlesGrid').innerHTML = '<div style="text-align:center;color:var(--muted);padding:3rem;grid-column:1/-1">Žádné články nenalezeny.</div>';
    return;
  }
  document.getElementById('articlesGrid').innerHTML = list.map(a=>{
    const c = CAT_MAP[a.cat]||{label:a.cat,color:'#999'};
    const excerpt = a.body.replace(/<[^>]+>/g,'').substring(0,120)+'...';
    return `
    <div class="article-card" onclick="viewArticle(${a.id})">
      <span class="article-cat" style="background:${c.color}22;color:${c.color}">${c.label}</span>
      <div class="article-title">${a.title}</div>
      <div class="article-excerpt">${excerpt}</div>
      <div class="article-meta">
        <span>${a.date}</span>
        <span>${a.views}× zobrazeno</span>
      </div>
    </div>`;
  }).join('');
}

function render(){renderSidebar();renderGrid()}

function viewArticle(id){
  const a = articles.find(x=>x.id===id);
  if(!a) return;
  a.views++;save();
  const c = CAT_MAP[a.cat]||{label:a.cat,color:'#999'};
  document.getElementById('articleContent').innerHTML = `
    <h2>${a.title}</h2>
    <div class="meta-bar">
      <span class="article-cat" style="background:${c.color}22;color:${c.color}">${c.label}</span>
      <span>📅 ${a.date}</span>
      <span>👁 ${a.views} zobrazení</span>
      <button class="btn btn-outline" style="margin-left:auto;padding:0.3rem 0.65rem;font-size:0.8rem" onclick="editArticle(${a.id})">✏️ Upravit</button>
      <button class="btn btn-outline" style="padding:0.3rem 0.65rem;font-size:0.8rem;color:var(--red);border-color:rgba(231,76,60,0.3)" onclick="deleteArticle(${a.id})">🗑️</button>
    </div>
    <div class="body">${a.body}</div>
  `;
  document.getElementById('listView').classList.add('hide');
  document.getElementById('articleView').classList.add('show');
}

function showList(){
  document.getElementById('listView').classList.remove('hide');
  document.getElementById('articleView').classList.remove('show');
  render();
}

function openModal(id){
  const a = id ? articles.find(x=>x.id===id) : null;
  document.getElementById('editId').value = id||'';
  document.getElementById('modalTitle').textContent = a ? 'Upravit článek' : 'Nový článek';
  document.getElementById('aTitle').value = a ? a.title : '';
  document.getElementById('aCat').value = a ? a.cat : 'seo';
  document.getElementById('aBody').value = a ? a.body : '';
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('show')}

function saveArticle(){
  const title = document.getElementById('aTitle').value.trim();
  const cat = document.getElementById('aCat').value;
  const body = document.getElementById('aBody').value.trim();
  if(!title||!body) return alert('Vyplňte název a obsah');
  const editId = document.getElementById('editId').value;
  if(editId){
    const a = articles.find(x=>x.id===parseInt(editId));
    a.title=title;a.cat=cat;a.body=body;
  } else {
    const today = new Date().toISOString().split('T')[0];
    articles.push({id:nextId++,title,cat,body,date:today,views:0});
  }
  save();closeModal();showList();render();
}

function editArticle(id){closeModal();openModal(id)}
function deleteArticle(id){
  if(!confirm('Smazat článek?')) return;
  articles = articles.filter(a=>a.id!==id);
  save();showList();render();
}

render();
</script>
