<html lang="cs">
<head>
<meta charset="UTF-8">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F5F3EE;--card:#FFFFFF;--accent:#1A1A1A;--accent-light:#333;--text:#1A1A1A;--muted:#888};--green:#2ecc71;--orange:#f39c12;--red:#e74c3c;--blue:#3498db}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent-light);text-decoration:none}

.header{background:var(--card);border-bottom:1px solid rgba(0,0,0,0.06);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.header-left{display:flex;align-items:center;gap:1rem}
.header h1{font-size:1.3rem;font-weight:700}
.header h1 span{color:var(--accent)}
.back-link{color:var(--muted);font-size:0.85rem;transition:color 0.3s}
.back-link:hover{color:var(--accent)}

.btn{padding:0.6rem 1.2rem;border:none;border-radius:10px;font-size:0.85rem;cursor:pointer;font-weight:600;transition:all 0.3s;display:inline-flex;align-items:center;gap:0.4rem}
.btn-primary{background:var(--accent);color:#F5F3EE}
.btn-primary:hover{background:var(--accent-light)}
.btn-secondary{background:rgba(0,0,0,0.04);color:var(--text);border:1px solid rgba(0,0,0,0.06)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:0.4rem 0.8rem;font-size:0.8rem}
.btn-danger{background:rgba(231,76,60,0.15);color:var(--red);border:1px solid rgba(231,76,60,0.2)}

.main{max-width:1100px;margin:0 auto;padding:1.5rem 2rem}
.layout{display:grid;grid-template-columns:320px 1fr;gap:1.5rem;align-items:start}

/* Sidebar - meeting list */
.sidebar{display:flex;flex-direction:column;gap:0.75rem}
.search-box{position:relative}
.search-box input{width:100%;padding:0.6rem 1rem 0.6rem 2.3rem;background:var(--card);border:1px solid rgba(0,0,0,0.06);border-radius:10px;color:#fff;font-size:0.85rem}
.search-box input:focus{outline:none;border-color:var(--accent)}
.search-box::before{content:'🔍';position:absolute;left:0.7rem;top:50%;transform:translateY(-50%);font-size:0.8rem}

.meeting-list{display:flex;flex-direction:column;gap:0.5rem;max-height:calc(100vh - 220px);overflow-y:auto}
.meeting-card{background:var(--card);border-radius:12px;padding:1rem;border:2px solid transparent;cursor:pointer;transition:all 0.3s}
.meeting-card:hover{border-color:rgba(0,0,0,0.06)}
.meeting-card.active{border-color:var(--accent)}
.mc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.4rem}
.mc-client{font-weight:700;font-size:0.9rem}
.mc-date{font-size:0.72rem;color:var(--muted)}
.mc-subject{font-size:0.82rem;color:rgba(255,255,255,0.6);margin-bottom:0.4rem}
.mc-tags{display:flex;gap:0.3rem;flex-wrap:wrap}
.mc-tag{font-size:0.65rem;padding:0.1rem 0.4rem;border-radius:4px;font-weight:600}
.mc-tag.actions{background:rgba(26,26,26,0.08);color:var(--accent)}
.mc-tag.done{background:rgba(46,204,113,0.15);color:var(--green)}

/* Editor */
.editor-area{display:flex;flex-direction:column;gap:1rem}
.editor-card{background:var(--card);border-radius:14px;padding:1.25rem;border:1px solid rgba(0,0,0,0.06)}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:0.75rem}
.form-group{display:flex;flex-direction:column;gap:0.3rem}
.form-group label{font-size:0.75rem;color:var(--muted);font-weight:600}
.form-group input,.form-group select,.form-group textarea{padding:0.55rem 0.8rem;background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.06);border-radius:8px;color:#fff;font-size:0.85rem;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent)}
.form-group textarea{min-height:120px;resize:vertical;line-height:1.6}

/* Action items */
.action-items{margin-top:0.5rem}
.action-item{display:flex;align-items:flex-start;gap:0.5rem;padding:0.5rem 0;border-bottom:1px solid rgba(0,0,0,0.04)}
.action-item:last-child{border:none}
.ai-check{width:18px;height:18px;border-radius:4px;border:2px solid rgba(255,255,255,0.2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all 0.3s;font-size:0.7rem}
.ai-check.checked{background:var(--green);border-color:var(--green)}
.ai-text{flex:1;font-size:0.85rem;line-height:1.5}
.ai-text.completed{text-decoration:line-through;color:var(--muted)}
.ai-text input{width:100%;background:transparent;border:none;color:#fff;font-size:0.85rem;font-family:inherit;padding:0}
.ai-text input:focus{outline:none}
.ai-owner{font-size:0.72rem;color:var(--muted);min-width:50px}
.ai-remove{background:none;border:none;color:var(--red);cursor:pointer;opacity:0.3;font-size:0.8rem;padding:0.2rem}
.ai-remove:hover{opacity:1}
.add-action{background:none;border:1px dashed rgba(255,255,255,0.15);border-radius:6px;color:var(--muted);padding:0.5rem;cursor:pointer;font-size:0.8rem;text-align:center;transition:all 0.3s;margin-top:0.5rem}
.add-action:hover{border-color:var(--accent);color:var(--accent)}

/* Type badges */
.type-badge{display:inline-flex;align-items:center;gap:0.3rem;font-size:0.7rem;padding:0.15rem 0.5rem;border-radius:6px;font-weight:600}
.type-intro{background:rgba(52,152,219,0.15);color:var(--blue)}
.type-progress{background:rgba(243,156,18,0.15);color:var(--orange)}
.type-handoff{background:rgba(46,204,113,0.15);color:var(--green)}
.type-upsell{background:rgba(155,89,182,0.15);color:#b682d4}
.type-support{background:rgba(26,26,26,0.08);color:var(--accent)}

/* Summary section */
.summary-block{background:rgba(255,255,255,0.03);border-radius:10px;padding:1rem;margin-top:0.75rem}
.summary-block h4{font-size:0.85rem;font-weight:700;margin-bottom:0.5rem;display:flex;align-items:center;gap:0.4rem}

/* Follow-up */
.followup{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1rem;background:rgba(26,26,26,0.04);border:1px solid rgba(233,69,96,0.15);border-radius:10px;margin-top:0.75rem}
.followup-icon{font-size:1.2rem}
.followup-text{font-size:0.85rem;flex:1}
.followup input{padding:0.4rem 0.6rem;background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.06);border-radius:6px;color:#fff;font-size:0.82rem}
.followup input:focus{outline:none;border-color:var(--accent)}

/* Empty state */
.empty{text-align:center;padding:3rem;color:var(--muted)}
.empty .icon{font-size:3rem;margin-bottom:1rem}

@media(max-width:800px){
  .layout{grid-template-columns:1fr}
  .main{padding:1rem}
  .form-row{grid-template-columns:1fr}
}

@media print{
  body{background:#fff !important;color:#1a1a2e !important}
  .header,.sidebar,.btn{display:none !important}
  .layout{grid-template-columns:1fr !important}
  .editor-card{border:1px solid #ddd !important;background:#fff !important}
  .form-group input,.form-group textarea,.form-group select{border-color:#ddd !important;color:#1a1a2e !important}
}
</style>

<body>

<div class="header">
  <div class="header-left">
    <a href="nastroje.html" class="back-link">← Nástroje</a>
    <h1>📝 Poznámky ze <span>schůzek</span></h1>
  </div>
  <div style="display:flex;gap:0.75rem">
    <button class="btn btn-secondary btn-sm" onclick="exportMeeting()">📤 Export</button>
    <button class="btn btn-secondary btn-sm" onclick="window.print()">🖨️ Tisk</button>
    <button class="btn btn-primary" onclick="newMeeting()">+ Nová schůzka</button>
  </div>
</div>

<div class="main">
<div class="layout">

<!-- Sidebar -->
<div class="sidebar">
  <div class="search-box">
    <input type="text" id="searchMeetings" placeholder="Hledat klienta, téma..." oninput="renderList()">
  </div>
  <div class="meeting-list" id="meetingList"></div>
</div>

<!-- Editor -->
<div class="editor-area" id="editorArea">
  <div class="empty" id="emptyState">
    <div class="icon">📝</div>
    <p>Vyberte schůzku nebo vytvořte novou</p>
    <button class="btn btn-primary" style="margin-top:1rem" onclick="newMeeting()">+ Nová schůzka</button>
  </div>

  <div id="editorContent" style="display:none">
    <div class="editor-card">
      <div class="form-row">
        <div class="form-group">
          <label>Klient</label>
          <input type="text" id="eClient" placeholder="Název klienta" oninput="autoSave()" list="clientDL">
          <datalist id="clientDL"></datalist>
        </div>
        <div class="form-group">
          <label>Typ schůzky</label>
          <select id="eType" onchange="autoSave()">
            <option value="intro">🤝 Úvodní schůzka</option>
            <option value="progress">📊 Průběh projektu</option>
            <option value="handoff">🎉 Předání projektu</option>
            <option value="upsell">💡 Upsell / nová nabídka</option>
            <option value="support">🔧 Podpora</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Datum a čas</label>
          <input type="datetime-local" id="eDate" oninput="autoSave()">
        </div>
        <div class="form-group">
          <label>Délka (min)</label>
          <input type="number" id="eDuration" value="30" min="5" step="5" oninput="autoSave()">
        </div>
      </div>
      <div class="form-group">
        <label>Předmět / téma</label>
        <input type="text" id="eSubject" placeholder="Hlavní téma schůzky" oninput="autoSave()">
      </div>
      <div class="form-group">
        <label>Účastníci</label>
        <input type="text" id="eAttendees" placeholder="Jména oddělená čárkou" oninput="autoSave()">
      </div>
    </div>

    <div class="editor-card">
      <h3 style="font-size:0.95rem;font-weight:700;margin-bottom:0.75rem">📋 Poznámky</h3>
      <div class="form-group">
        <textarea id="eNotes" rows="8" placeholder="• Volné poznámky ze schůzky...&#10;• Co se probralo&#10;• Důležité informace&#10;• Rozhodnutí" oninput="autoSave()"></textarea>
      </div>

      <div class="summary-block">
        <h4>📌 Klíčové závěry</h4>
        <div class="form-group">
          <textarea id="eConclusions" rows="3" placeholder="Shrnutí nejdůležitějších bodů a rozhodnutí..." oninput="autoSave()"></textarea>
        </div>
      </div>
    </div>

    <div class="editor-card">
      <h3 style="font-size:0.95rem;font-weight:700;margin-bottom:0.75rem">✅ Action items</h3>
      <div class="action-items" id="actionItems"></div>
      <button class="add-action" onclick="addAction()">+ Přidat úkol</button>
    </div>

    <div class="editor-card">
      <div class="followup">
        <div class="followup-icon">📅</div>
        <div class="followup-text"><strong>Follow-up:</strong></div>
        <input type="date" id="eFollowup" oninput="autoSave()">
        <input type="text" id="eFollowupNote" placeholder="Poznámka k follow-upu" style="flex:1" oninput="autoSave()">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;justify-content:flex-end">
      <button class="btn btn-danger btn-sm" onclick="deleteMeeting()">🗑️ Smazat</button>
      <button class="btn btn-secondary btn-sm" onclick="copyToClipboard()">📋 Kopírovat text</button>
      <button class="btn btn-secondary btn-sm" onclick="sendFollowupEmail()">✉️ Follow-up email</button>
    </div>
  </div>
</div>

</div>
</div>

<script>
let meetings = [];
let currentId = null;
let saveTimeout = null;

const typeLabels = {
  intro: { icon: '🤝', label: 'Úvodní', cls: 'type-intro' },
  progress: { icon: '📊', label: 'Průběh', cls: 'type-progress' },
  handoff: { icon: '🎉', label: 'Předání', cls: 'type-handoff' },
  upsell: { icon: '💡', label: 'Upsell', cls: 'type-upsell' },
  support: { icon: '🔧', label: 'Podpora', cls: 'type-support' }
};

const demoMeetings = [
  {
    id: 1, client: 'Kavárna U Mlýna', type: 'intro', date: '2026-02-15T10:00',
    duration: 45, subject: 'Úvodní konzultace — redesign webu',
    attendees: 'Jan Novák (majitel), Ondra',
    notes: '• Současný web je na WordPress, zastaralý design z 2019\n• Chtějí moderní vzhled, mobilní verzi a online rezervace\n• Mají fotky interiéru a jídel — kvalitní, od fotografa\n• Budget: 15–25K Kč\n• Termín: chtěli by do konce března\n• Konkurence: kavárna-mesto.cz — líbí se jim styl\n• Měsíční provoz: cca 300 návštěv, chtějí víc',
    conclusions: 'Klient souhlasí s redesignem na statickém webu (rychlejší, levnější). Zahrneme: homepage, menu, fotogalerie, rezervace, kontakt. Rozpočet schválen na 20K Kč.',
    actions: [
      { text: 'Připravit nabídku s 3 variantami (Basic, Standard, Premium)', done: true, owner: 'Ondra' },
      { text: 'Poslat přístupy k současnému hostingu', done: true, owner: 'Jan' },
      { text: 'Dodat fotky a texty pro menu stránku', done: false, owner: 'Jan' },
      { text: 'Wireframe homepage — první návrh', done: true, owner: 'Ondra' },
    ],
    followup: '2026-02-22', followupNote: 'Schůzka nad wireframem'
  },
  {
    id: 2, client: 'E-shop TechGear', type: 'progress', date: '2026-02-25T14:30',
    duration: 30, subject: 'Stav implementace Shopify e-shopu',
    attendees: 'Petr Černý (CEO), Marie Dvořáková (marketing), Ondra',
    notes: '• Shopify theme customizace hotová z 80%\n• Produktový katalog: 120 produktů importováno\n• Platební brána: GoPay integrace v testování\n• SEO: základní meta tagy hotové, blog zatím ne\n• Marie chce napojit Mailchimp pro newsletter\n• Problém: produktové fotky nemají konzistentní pozadí',
    conclusions: 'E-shop bude připraven na soft launch 5. března. Fotky produktů vyřeší externí fotograf. Mailchimp integrace příští týden.',
    actions: [
      { text: 'Dokončit GoPay testovací platby', done: true, owner: 'Ondra' },
      { text: 'Nastavit Mailchimp pop-up pro sběr emailů', done: false, owner: 'Ondra' },
      { text: 'Zajistit přefocení 40 produktů s bílým pozadím', done: false, owner: 'Petr' },
      { text: 'Připravit launch email pro stávající zákazníky', done: false, owner: 'Marie' },
    ],
    followup: '2026-03-03', followupNote: 'Kontrola před soft launchem'
  },
  {
    id: 3, client: 'Reality Premium', type: 'upsell', date: '2026-02-28T09:00',
    duration: 60, subject: 'AI chatbot pro nemovitosti — nová nabídka',
    attendees: 'Lucie Králová (jednatelka), Ondra',
    notes: '• Web funguje dobře, 800+ návštěv/měsíc\n• Problém: hodně opakujících se dotazů (ceny, lokality, prohlídky)\n• Lucie chce automatizovat — AI chatbot na webu\n• Požadavky: odpovídat na FAQ, sbírat kontakty, doporučit nemovitosti\n• Ukázal jsem demo chatbota z portfolia — líbí se\n• Budget pro chatbot: 10–15K jednorázově + údržba\n• Také zájem o Google Ads kampaň',
    conclusions: 'Připravím nabídku na AI chatbot + Google Ads paket. Chatbot bude na FAQ + lead capture. Ads budget klienta: 5K/měsíc.',
    actions: [
      { text: 'Připravit nabídku AI chatbot (Tidio/custom)', done: false, owner: 'Ondra' },
      { text: 'Cenová kalkulace Google Ads kampaně', done: false, owner: 'Ondra' },
      { text: 'Poslat seznam 20 nejčastějších dotazů zákazníků', done: false, owner: 'Lucie' },
      { text: 'Připravit case study s ROI odhadem', done: false, owner: 'Ondra' },
    ],
    followup: '2026-03-07', followupNote: 'Prezentace nabídky chatbot + Ads'
  }
];

function init() {
  const saved = sessionStorage.getItem('kudli_meetings');
  if (saved) {
    meetings = JSON.parse(saved);
  } else {
    meetings = [...demoMeetings];
    save();
  }
  renderList();
}

function save() {
  sessionStorage.setItem('kudli_meetings', JSON.stringify(meetings));
}

function autoSave() {
  if (!currentId) return;
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    const m = meetings.find(x => x.id === currentId);
    if (!m) return;
    m.client = document.getElementById('eClient').value;
    m.type = document.getElementById('eType').value;
    m.date = document.getElementById('eDate').value;
    m.duration = parseInt(document.getElementById('eDuration').value) || 30;
    m.subject = document.getElementById('eSubject').value;
    m.attendees = document.getElementById('eAttendees').value;
    m.notes = document.getElementById('eNotes').value;
    m.conclusions = document.getElementById('eConclusions').value;
    m.followup = document.getElementById('eFollowup').value;
    m.followupNote = document.getElementById('eFollowupNote').value;

    // Save actions
    m.actions = [];
    document.querySelectorAll('#actionItems .action-item').forEach(ai => {
      m.actions.push({
        text: ai.querySelector('.ai-text input').value,
        done: ai.querySelector('.ai-check').classList.contains('checked'),
        owner: ai.querySelector('.ai-owner input') ? ai.querySelector('.ai-owner input').value : ''
      });
    });

    save();
    renderList();
  }, 300);
}

function renderList() {
  const search = document.getElementById('searchMeetings').value.toLowerCase();
  const filtered = meetings.filter(m => {
    if (!search) return true;
    return `${m.client} ${m.subject} ${m.notes} ${m.attendees}`.toLowerCase().includes(search);
  }).sort((a, b) => new Date(b.date) - new Date(a.date));

  const container = document.getElementById('meetingList');
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty" style="padding:2rem"><div class="icon">📭</div><p>Žádné schůzky</p></div>';
    return;
  }

  container.innerHTML = filtered.map(m => {
    const t = typeLabels[m.type] || typeLabels.intro;
    const d = m.date ? new Date(m.date) : null;
    const dateStr = d ? d.toLocaleDateString('cs', { day: 'numeric', month: 'short' }) + ' ' + d.toLocaleTimeString('cs', { hour: '2-digit', minute: '2-digit' }) : '';
    const totalActions = (m.actions || []).length;
    const doneActions = (m.actions || []).filter(a => a.done).length;
    const allDone = totalActions > 0 && doneActions === totalActions;

    return `
      <div class="meeting-card ${m.id === currentId ? 'active' : ''}" onclick="openMeeting(${m.id})">
        <div class="mc-top">
          <span class="mc-client">${m.client || 'Bez klienta'}</span>
          <span class="mc-date">${dateStr}</span>
        </div>
        <div class="mc-subject">${m.subject || '(bez tématu)'}</div>
        <div class="mc-tags">
          <span class="mc-tag type-badge ${t.cls}">${t.icon} ${t.label}</span>
          ${totalActions > 0 ? `<span class="mc-tag ${allDone ? 'done' : 'actions'}">${doneActions}/${totalActions} úkolů</span>` : ''}
          ${m.followup ? `<span class="mc-tag" style="background:rgba(52,152,219,0.15);color:var(--blue)">📅 Follow-up</span>` : ''}
        </div>
      </div>
    `;
  }).join('');

  // Update client datalist
  const clients = [...new Set(meetings.map(m => m.client).filter(Boolean))];
  document.getElementById('clientDL').innerHTML = clients.map(c => `<option value="${c}">`).join('');
}

function openMeeting(id) {
  currentId = id;
  const m = meetings.find(x => x.id === id);
  if (!m) return;

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('editorContent').style.display = 'flex';
  document.getElementById('editorContent').style.flexDirection = 'column';
  document.getElementById('editorContent').style.gap = '1rem';

  document.getElementById('eClient').value = m.client || '';
  document.getElementById('eType').value = m.type || 'intro';
  document.getElementById('eDate').value = m.date || '';
  document.getElementById('eDuration').value = m.duration || 30;
  document.getElementById('eSubject').value = m.subject || '';
  document.getElementById('eAttendees').value = m.attendees || '';
  document.getElementById('eNotes').value = m.notes || '';
  document.getElementById('eConclusions').value = m.conclusions || '';
  document.getElementById('eFollowup').value = m.followup || '';
  document.getElementById('eFollowupNote').value = m.followupNote || '';

  renderActions(m.actions || []);
  renderList();
}

function renderActions(actions) {
  const container = document.getElementById('actionItems');
  container.innerHTML = actions.map((a, i) => `
    <div class="action-item">
      <div class="ai-check ${a.done ? 'checked' : ''}" onclick="toggleAction(this)">${a.done ? '✓' : ''}</div>
      <div class="ai-text ${a.done ? 'completed' : ''}">
        <input type="text" value="${escHTML(a.text)}" oninput="autoSave()" placeholder="Úkol...">
      </div>
      <div class="ai-owner">
        <input type="text" value="${escHTML(a.owner || '')}" oninput="autoSave()" placeholder="Kdo" style="width:60px;background:transparent;border:none;color:var(--muted);font-size:0.72rem;text-align:right">
      </div>
      <button class="ai-remove" onclick="this.closest('.action-item').remove();autoSave()">✕</button>
    </div>
  `).join('');
}

function escHTML(s) { return s.replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

function toggleAction(el) {
  el.classList.toggle('checked');
  el.textContent = el.classList.contains('checked') ? '✓' : '';
  const textDiv = el.nextElementSibling;
  textDiv.classList.toggle('completed');
  autoSave();
}

function addAction() {
  const container = document.getElementById('actionItems');
  const div = document.createElement('div');
  div.className = 'action-item';
  div.innerHTML = `
    <div class="ai-check" onclick="toggleAction(this)"></div>
    <div class="ai-text"><input type="text" placeholder="Nový úkol..." oninput="autoSave()"></div>
    <div class="ai-owner"><input type="text" placeholder="Kdo" oninput="autoSave()" style="width:60px;background:transparent;border:none;color:var(--muted);font-size:0.72rem;text-align:right"></div>
    <button class="ai-remove" onclick="this.closest('.action-item').remove();autoSave()">✕</button>
  `;
  container.appendChild(div);
  div.querySelector('.ai-text input').focus();
}

function newMeeting() {
  const m = {
    id: Date.now(),
    client: '',
    type: 'intro',
    date: new Date().toISOString().slice(0, 16),
    duration: 30,
    subject: '',
    attendees: 'Ondra',
    notes: '',
    conclusions: '',
    actions: [],
    followup: '',
    followupNote: ''
  };
  meetings.unshift(m);
  save();
  openMeeting(m.id);
}

function deleteMeeting() {
  if (!currentId) return;
  if (!confirm('Smazat tuto schůzku?')) return;
  meetings = meetings.filter(m => m.id !== currentId);
  currentId = null;
  save();
  document.getElementById('emptyState').style.display = 'block';
  document.getElementById('editorContent').style.display = 'none';
  renderList();
}

function exportMeeting() {
  if (!currentId) { alert('Vyberte schůzku'); return; }
  const m = meetings.find(x => x.id === currentId);
  if (!m) return;
  const text = formatMeetingText(m);
  const blob = new Blob([text], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `schuzka-${m.client.replace(/\s+/g, '-').toLowerCase()}-${(m.date || '').split('T')[0]}.md`;
  a.click();
  URL.revokeObjectURL(url);
}

function formatMeetingText(m) {
  const t = typeLabels[m.type] || typeLabels.intro;
  const d = m.date ? new Date(m.date).toLocaleDateString('cs', { day: 'numeric', month: 'long', year: 'numeric' }) : '';
  let txt = `# ${m.subject || 'Schůzka'}\n\n`;
  txt += `**Klient:** ${m.client}\n`;
  txt += `**Datum:** ${d}\n`;
  txt += `**Typ:** ${t.label}\n`;
  txt += `**Délka:** ${m.duration} min\n`;
  txt += `**Účastníci:** ${m.attendees}\n\n`;
  txt += `## Poznámky\n\n${m.notes}\n\n`;
  if (m.conclusions) txt += `## Klíčové závěry\n\n${m.conclusions}\n\n`;
  if (m.actions && m.actions.length > 0) {
    txt += `## Action items\n\n`;
    m.actions.forEach(a => {
      txt += `- [${a.done ? 'x' : ' '}] ${a.text}${a.owner ? ` (${a.owner})` : ''}\n`;
    });
    txt += '\n';
  }
  if (m.followup) {
    txt += `## Follow-up\n\n📅 ${new Date(m.followup).toLocaleDateString('cs')}`;
    if (m.followupNote) txt += ` — ${m.followupNote}`;
    txt += '\n';
  }
  return txt;
}

function copyToClipboard() {
  if (!currentId) return;
  const m = meetings.find(x => x.id === currentId);
  if (!m) return;
  navigator.clipboard.writeText(formatMeetingText(m)).then(() => {
    alert('Zkopírováno do schránky!');
  });
}

function sendFollowupEmail() {
  if (!currentId) return;
  const m = meetings.find(x => x.id === currentId);
  if (!m) return;
  const subject = `Follow-up: ${m.subject || 'Schůzka'} — Kudli. marketing`;
  let body = `Dobrý den,\n\nděkuji za schůzku${m.date ? ' dne ' + new Date(m.date).toLocaleDateString('cs') : ''}.\n\n`;
  if (m.conclusions) body += `Shrnutí:\n${m.conclusions}\n\n`;
  if (m.actions && m.actions.filter(a => !a.done).length > 0) {
    body += `Otevřené úkoly:\n`;
    m.actions.filter(a => !a.done).forEach(a => {
      body += `• ${a.text}${a.owner ? ' (' + a.owner + ')' : ''}\n`;
    });
    body += '\n';
  }
  if (m.followup) body += `Další schůzka: ${new Date(m.followup).toLocaleDateString('cs')}${m.followupNote ? ' — ' + m.followupNote : ''}\n\n`;
  body += `S pozdravem,\nOndra Kudlička\nKudli. marketing`;
  window.open(`mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`);
}

init();
