<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#0C0C0C"/>
  <g transform="translate(200,200)">
    <!-- KUDLA Z BRNA logo from the site -->
    <text x="-120" y="-10" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="900" font-size="72" fill="#E8E0D4" letter-spacing="-2">KUDLA</text>
    <!-- Blue Z -->
    <g transform="translate(95,-35)">
      <polygon points="0,0 40,0 0,65 40,65" fill="#3B82F6"/>
      <rect x="0" y="0" width="40" height="10" fill="#3B82F6"/>
      <rect x="0" y="55" width="40" height="10" fill="#3B82F6"/>
      <polygon points="35,0 40,0 5,55 0,55" fill="#3B82F6"/>
    </g>
    <!-- BRNA vertical -->
    <text x="142" y="-25" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="28" fill="#E8E0D4">B</text>
    <text x="142" y="5" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="28" fill="#E8E0D4">R</text>
    <text x="142" y="35" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="28" fill="#E8E0D4">N</text>
    <text x="142" y="65" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="28" fill="#E8E0D4">A</text>
  </g>
</svg>
