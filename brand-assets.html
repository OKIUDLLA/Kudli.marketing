<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F5F3EE;--card:#FFFFFF;--accent:#1A1A1A;--accent-light:#333;--text:#1A1A1A;--muted:#888};--green:#2ecc71;--orange:#f39c12;--red:#e74c3c;--blue:#3498db}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent-light);text-decoration:none}

.header{background:var(--card);border-bottom:1px solid rgba(0,0,0,0.06);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.header-left{display:flex;align-items:center;gap:1rem}
.header h1{font-size:1.3rem;font-weight:700}
.header h1 span{color:var(--accent)}
.back-link{color:var(--muted);font-size:0.85rem}

.btn{padding:0.55rem 1rem;border:none;border-radius:10px;font-size:0.82rem;cursor:pointer;font-weight:600;transition:all 0.3s;display:inline-flex;align-items:center;gap:0.4rem}
.btn-primary{background:var(--accent);color:#F5F3EE}
.btn-primary:hover{background:var(--accent-light)}
.btn-secondary{background:rgba(0,0,0,0.04);color:var(--text);border:1px solid rgba(0,0,0,0.06)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:0.35rem 0.7rem;font-size:0.78rem}

.main{max-width:1000px;margin:0 auto;padding:1.5rem 2rem}

/* Client tabs */
.client-tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap;overflow-x:auto}
.client-tab{padding:0.5rem 1rem;border-radius:10px;font-size:0.85rem;cursor:pointer;border:1px solid rgba(0,0,0,0.06);background:transparent;color:var(--muted);transition:all 0.3s;font-weight:600;white-space:nowrap}
.client-tab:hover{border-color:rgba(255,255,255,0.3)}
.client-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Section */
.section{margin-bottom:2rem}
.section-title{font-size:1rem;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-size:0.8rem}
.section-title::after{content:'';flex:1;height:1px;background:rgba(0,0,0,0.06)}

/* Color palette */
.color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:0.75rem}
.color-card{background:var(--card);border-radius:12px;overflow:hidden;border:1px solid rgba(0,0,0,0.06);cursor:pointer;transition:all 0.3s}
.color-card:hover{border-color:rgba(255,255,255,0.15);transform:translateY(-2px)}
.color-swatch{height:80px;position:relative}
.color-swatch .copy-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);opacity:0;transition:opacity 0.3s;font-size:0.8rem;font-weight:600}
.color-card:hover .copy-hint{opacity:1}
.color-info{padding:0.75rem}
.color-name{font-size:0.82rem;font-weight:700;margin-bottom:0.2rem}
.color-hex{font-size:0.75rem;color:var(--muted);font-family:'Courier New',monospace}
.color-usage{font-size:0.7rem;color:var(--muted);margin-top:0.2rem}

/* Add color */
.add-color{background:var(--card);border:2px dashed rgba(0,0,0,0.06);border-radius:12px;display:flex;align-items:center;justify-content:center;min-height:130px;cursor:pointer;color:var(--muted);font-size:0.85rem;transition:all 0.3s}
.add-color:hover{border-color:var(--accent);color:var(--accent)}

/* Font cards */
.font-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:0.75rem}
.font-card{background:var(--card);border-radius:12px;padding:1.25rem;border:1px solid rgba(0,0,0,0.06)}
.font-preview{font-size:2rem;margin-bottom:0.75rem;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.font-name{font-size:0.85rem;font-weight:700}
.font-meta{font-size:0.75rem;color:var(--muted);margin-top:0.2rem}
.font-weights{display:flex;gap:0.3rem;margin-top:0.5rem;flex-wrap:wrap}
.font-weight-chip{padding:0.15rem 0.4rem;border-radius:4px;background:rgba(0,0,0,0.06);font-size:0.68rem;color:var(--muted)}

/* Guidelines */
.guide-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:0.75rem}
.guide-card{background:var(--card);border-radius:12px;padding:1rem;border:1px solid rgba(0,0,0,0.06)}
.guide-card h4{font-size:0.9rem;font-weight:700;margin-bottom:0.5rem;display:flex;align-items:center;gap:0.4rem}
.guide-card p{font-size:0.82rem;color:rgba(255,255,255,0.6);line-height:1.5}
.guide-do-dont{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-top:0.5rem}
.guide-do,.guide-dont{padding:0.5rem;border-radius:8px;font-size:0.78rem}
.guide-do{background:rgba(46,204,113,0.08);border:1px solid rgba(46,204,113,0.15);color:rgba(46,204,113,0.8)}
.guide-dont{background:rgba(231,76,60,0.08);border:1px solid rgba(231,76,60,0.15);color:rgba(231,76,60,0.8)}

/* Logo section */
.logo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0.75rem}
.logo-card{background:var(--card);border-radius:12px;padding:1.5rem;border:1px solid rgba(0,0,0,0.06);text-align:center;cursor:pointer;transition:all 0.3s}
.logo-card:hover{border-color:rgba(255,255,255,0.15)}
.logo-preview{height:60px;display:flex;align-items:center;justify-content:center;margin-bottom:0.75rem;font-size:1.5rem;font-weight:900}
.logo-label{font-size:0.8rem;color:var(--muted)}

/* Tone of voice */
.tov-card{background:var(--card);border-radius:12px;padding:1.25rem;border:1px solid rgba(0,0,0,0.06)}
.tov-attrs{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem}
.tov-attr{padding:0.3rem 0.7rem;border-radius:8px;font-size:0.8rem;font-weight:600}
.tov-examples{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}
.tov-example{padding:0.75rem;border-radius:8px;font-size:0.82rem;line-height:1.5}
.tov-yes{background:rgba(46,204,113,0.08);border:1px solid rgba(46,204,113,0.15)}
.tov-no{background:rgba(231,76,60,0.08);border:1px solid rgba(231,76,60,0.15)}

/* Notes */
.brand-notes{margin-top:1rem}
.brand-notes textarea{width:100%;padding:0.75rem;background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.06);border-radius:10px;color:#fff;font-family:inherit;font-size:0.85rem;min-height:80px;resize:vertical}
.brand-notes textarea:focus{outline:none;border-color:var(--accent)}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal-overlay.show{display:flex}
.modal{background:var(--bg);border:1px solid rgba(0,0,0,0.06);border-radius:16px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.modal-header{padding:1.25rem 1.5rem;border-bottom:1px solid rgba(0,0,0,0.06);display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:1.1rem;font-weight:700}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer}
.modal-body{padding:1.5rem}
.modal-footer{padding:1rem 1.5rem;border-top:1px solid rgba(0,0,0,0.06);display:flex;justify-content:flex-end;gap:0.75rem}
.form-group{margin-bottom:0.85rem}
.form-group label{display:block;font-size:0.78rem;color:var(--muted);margin-bottom:0.3rem;font-weight:600}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:0.55rem 0.8rem;background:var(--card);border:1px solid rgba(0,0,0,0.06);border-radius:8px;color:#fff;font-size:0.85rem;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}

@media(max-width:600px){
  .main{padding:1rem}
  .color-grid{grid-template-columns:repeat(2,1fr)}
  .font-grid,.guide-grid,.logo-grid{grid-template-columns:1fr}
  .tov-examples,.guide-do-dont{grid-template-columns:1fr}
}

<body>

<div class="header">
  <div class="header-left">
    <a href="nastroje.html" class="back-link">← Nástroje</a>
    <h1>🎨 Brand <span>Assets</span></h1>
  </div>
  <div style="display:flex;gap:0.75rem">
    <button class="btn btn-secondary btn-sm" onclick="loadDemo()">🎯 Demo</button>
    <button class="btn btn-secondary btn-sm" onclick="exportBrand()">📤 Export</button>
    <button class="btn btn-primary" onclick="addClient()">+ Klient</button>
  </div>
</div>

<div class="main">
  <div class="client-tabs" id="clientTabs"></div>
  <div id="brandContent"></div>
</div>

<!-- Color Modal -->
<div class="modal-overlay" id="colorModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Přidat barvu</h3>
      <button class="modal-close" onclick="closeColorModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Název barvy</label>
        <input type="text" id="fcName" placeholder="Primary, Accent...">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>HEX</label>
          <input type="text" id="fcHex" placeholder="#e94560" oninput="syncColorPreview()">
        </div>
        <div class="form-group">
          <label>Vybrat</label>
          <input type="color" id="fcPicker" value="#e94560" style="height:36px;padding:2px" oninput="document.getElementById('fcHex').value=this.value;syncColorPreview()">
        </div>
      </div>
      <div class="form-group">
        <label>Použití</label>
        <input type="text" id="fcUsage" placeholder="Nadpisy, CTA tlačítka...">
      </div>
      <div id="colorPreviewBox" style="height:40px;border-radius:8px;margin-top:0.5rem"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeColorModal()">Zrušit</button>
      <button class="btn btn-primary" onclick="saveColor()">💾 Uložit</button>
    </div>
  </div>
</div>

<script>
function escHTML(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");}
let brands = [];
let currentBrand = null;

function init() {
  const saved = sessionStorage.getItem('kudli_brands');
  if (saved) {
    const d = JSON.parse(saved);
    brands = d.brands || [];
    currentBrand = d.currentBrand || null;
  }
  if (brands.length === 0) { loadDemo(); return; }
  renderAll();
}

function save() {
  sessionStorage.setItem('kudli_brands', JSON.stringify({ brands, currentBrand }));
}

function getBrand() { return brands.find(b => b.id === currentBrand); }

function renderAll() {
  renderTabs();
  renderContent();
}

function renderTabs() {
  document.getElementById('clientTabs').innerHTML = brands.map(b =>
    `<button class="client-tab ${b.id === currentBrand ? 'active' : ''}" onclick="currentBrand='${b.id}';save();renderAll()">${b.name}</button>`
  ).join('');
}

function renderContent() {
  const brand = getBrand();
  if (!brand) { document.getElementById('brandContent').innerHTML = '<div style="text-align:center;padding:3rem;color:var(--muted)">Přidejte klienta</div>'; return; }

  let html = '';

  // Logo
  html += `<div class="section"><div class="section-title">📐 Logo varianty</div>
    <div class="logo-grid">
      ${(brand.logos || []).map((l, i) => `
        <div class="logo-card" style="background:${l.bg}">
          <div class="logo-preview" style="color:${l.textColor}">${l.text || brand.name}</div>
          <div class="logo-label">${l.label}</div>
        </div>
      `).join('')}
    </div></div>`;

  // Colors
  html += `<div class="section"><div class="section-title">🎨 Barevná paleta</div>
    <div class="color-grid">
      ${(brand.colors || []).map((c, i) => `
        <div class="color-card" onclick="copyHex('${c.hex}')">
          <div class="color-swatch" style="background:${c.hex}"><div class="copy-hint">📋 Kopírovat</div></div>
          <div class="color-info">
            <div class="color-name">${c.name}</div>
            <div class="color-hex">${c.hex}</div>
            ${c.usage ? `<div class="color-usage">${c.usage}</div>` : ''}
          </div>
        </div>
      `).join('')}
      <div class="add-color" onclick="openColorModal()">+ Přidat barvu</div>
    </div></div>`;

  // Fonts
  html += `<div class="section"><div class="section-title">🔤 Typografie</div>
    <div class="font-grid">
      ${(brand.fonts || []).map(f => `
        <div class="font-card">
          <div class="font-preview" style="font-family:${f.family},system-ui">${f.preview || 'Aa Bb Cc 123'}</div>
          <div class="font-name">${f.family}</div>
          <div class="font-meta">${f.role} · ${f.source || 'Google Fonts'}</div>
          <div class="font-weights">${(f.weights || []).map(w => `<span class="font-weight-chip">${w}</span>`).join('')}</div>
        </div>
      `).join('')}
    </div></div>`;

  // Tone of voice
  if (brand.toneOfVoice) {
    const tov = brand.toneOfVoice;
    html += `<div class="section"><div class="section-title">🗣️ Tone of Voice</div>
      <div class="tov-card">
        <div class="tov-attrs">${(tov.attributes || []).map(a => `<span class="tov-attr" style="background:rgba(26,26,26,0.08);color:var(--accent)">${a}</span>`).join('')}</div>
        ${tov.description ? `<p style="font-size:0.88rem;color:rgba(255,255,255,0.7);line-height:1.6;margin-bottom:1rem">${tov.description}</p>` : ''}
        <div class="tov-examples">
          ${tov.goodExample ? `<div class="tov-example tov-yes"><strong style="color:var(--green)">✅ Takto ano:</strong><br>${tov.goodExample}</div>` : ''}
          ${tov.badExample ? `<div class="tov-example tov-no"><strong style="color:var(--red)">❌ Takto ne:</strong><br>${tov.badExample}</div>` : ''}
        </div>
      </div></div>`;
  }

  // Guidelines
  if (brand.guidelines && brand.guidelines.length > 0) {
    html += `<div class="section"><div class="section-title">📋 Brand Guidelines</div>
      <div class="guide-grid">
        ${brand.guidelines.map(g => `
          <div class="guide-card">
            <h4>${g.icon || '📌'} ${g.title}</h4>
            <p>${g.description}</p>
            ${g.doText || g.dontText ? `<div class="guide-do-dont">
              ${g.doText ? `<div class="guide-do">✅ ${g.doText}</div>` : ''}
              ${g.dontText ? `<div class="guide-dont">❌ ${g.dontText}</div>` : ''}
            </div>` : ''}
          </div>
        `).join('')}
      </div></div>`;
  }

  // Notes
  html += `<div class="section brand-notes"><div class="section-title">📝 Poznámky</div>
    <textarea id="brandNotes" placeholder="Další poznámky k brandu..." oninput="saveBrandNotes()">${brand.notes || ''}</textarea></div>`;

  document.getElementById('brandContent').innerHTML = html;
}

function copyHex(hex) {
  navigator.clipboard.writeText(hex).then(() => {
    const toast = document.createElement('div');
    toast.textContent = `✅ ${hex} zkopírováno`;
    toast.style.cssText = 'position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:0.5rem 1.25rem;border-radius:10px;font-size:0.85rem;font-weight:600;z-index:9999';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 1500);
  });
}

function saveBrandNotes() {
  const brand = getBrand();
  if (brand) { brand.notes = document.getElementById('brandNotes').value; save(); }
}

// Color modal
function openColorModal() {
  document.getElementById('fcName').value = '';
  document.getElementById('fcHex').value = '#e94560';
  document.getElementById('fcPicker').value = '#e94560';
  document.getElementById('fcUsage').value = '';
  syncColorPreview();
  document.getElementById('colorModal').classList.add('show');
}
function closeColorModal() { document.getElementById('colorModal').classList.remove('show'); }
function syncColorPreview() {
  const hex = document.getElementById('fcHex').value;
  document.getElementById('colorPreviewBox').style.background = hex;
  document.getElementById('fcPicker').value = hex;
}
function saveColor() {
  const brand = getBrand();
  if (!brand) return;
  if (!brand.colors) brand.colors = [];
  brand.colors.push({
    name: document.getElementById('fcName').value || 'Barva',
    hex: document.getElementById('fcHex').value,
    usage: document.getElementById('fcUsage').value,
  });
  save(); closeColorModal(); renderContent();
}

function addClient() {
  const name = prompt('Název klienta:');
  if (!name) return;
  const b = {
    id: 'b' + Date.now(), name,
    colors: [], fonts: [], logos: [], guidelines: [], toneOfVoice: null, notes: ''
  };
  brands.push(b);
  currentBrand = b.id;
  save(); renderAll();
}

function exportBrand() {
  const brand = getBrand();
  if (!brand) return;
  const blob = new Blob([JSON.stringify(brand, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `brand-${brand.name.replace(/\s+/g, '-').toLowerCase()}.json`;
  a.click();
}

      ],

        { icon: '🎨', title: 'Barvy', description: 'Accent červená (#e94560) jen pro CTA a důležité elementy. Nepoužívat ji na velké plochy.', doText: 'Tmavé pozadí + accent CTA', dontText: 'Celá stránka v červené' },

        { icon: '📸', title: 'Fotografie', description: 'Preferujeme tmavší tóny, technologický look. Žádné stock fotky s faleznými úsměvy.', doText: 'Reálné fotky, dark aesthetic', dontText: 'Generic stock photos' },

    },
    {
